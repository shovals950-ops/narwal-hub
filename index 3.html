0Pa", "FlowWash Roller", "NarMind Pro / AI", "כן", "תחנה מתקדמת", "עד 220 דק׳", "פרימיום מתקדם"], ["Narwal Flow", "22,000Pa", "FlowWash Roller", "Smart Mapping", "תלוי דגם", "תחנת שטיפה", "עד 200 דק׳", "שואב שוטף חכם"], ["Narwal Freo Z Ultra", "12,000Pa", "Dual Mop", "Dual AI", "כן", "תחנת ניקוי מלאה", "עד 210 דק׳", "AI מתקדם"], ["Narwal Freo X Ultra", "8,200Pa", "Mop Pads", "DirtSense", "לא", "תחנה חכמה", "עד 200 דק׳", "חזק ויציב"]]};const WA='972504546986';let state={page:'home',history:[],cat:'all',profile:JSON.parse(localStorage.getItem('nh_profile')||'null')||{model:'Narwal Flow 2',serial:'',purchaseDate:'',warranty:'',firmware:'',notes:''},faults:JSON.parse(localStorage.getItem('nh_faults')||'[]'),reminders:JSON.parse(localStorage.getItem('nh_reminders')||'[{"part":"פילטר","every":"30 יום","last":""},{"part":"רולר","every":"30 יום","last":""},{"part":"מברשות","every":"45 יום","last":""}]')};const pages=[['home','בית'],['faq','FAQ'],['errors','תקלות'],['videos','סרטונים'],['downloads','הורדות'],['models','דגמים'],['compare','השוואה'],['whatsapp','WhatsApp'],['trouble','פתרון תקלות'],['device','תיק מכשיר'],['admin','ניהול']];

function modelsPage(){return `<h2>דגמים</h2><div class="cards">${DATA.models.map((m,i)=>`<div class="card"><div class="modelImg"></div><h3>${m[0]}</h3><p>שאיבה: <b>${m[1]}</b><br>שטיפה: ${m[2]}<br>AI: ${m[3]}<br>${m[7]}</p><button class="btn alt" onclick="App.show('compare');setTimeout(()=>{cmpA.value='${i}';cmpB.value='${(i+1)%DATA.models.length}';App.compare()},50)">השווה</button></div>`).join('')}</div>`}

function whatsappPage(){return `<h2>תמיכה ב-WhatsApp</h2><div class="cards"><div class="card"><h3>תקלה בשואב</h3><p>נשלח ל־050-454-6986</p><a class="wa" target="_blank" href="https://wa.me/${WA}?text=${encodeURIComponent('היי, יש לי תקלה בשואב Narwal. דגם: ___ קוד תקלה: ___ תיאור: ___')}">שלח WhatsApp</a><a class="call" href="tel:0504546986">התקשר עכשיו</a></div><div class="card"><h3>שאלה כללית</h3><a class="wa" target="_blank" href="https://wa.me/${WA}?text=${encodeURIComponent('היי, יש לי שאלה לגבי Narwal: ')}">שלח WhatsApp</a></div></div>`}
function troublePage(){return `<h2>פתרון תקלות</h2><div class="card"><select id="troubleType"><option value="water">מים / טיפות / שטיפה חלשה</option><option value="wifi">Wi‑Fi / אפליקציה</option><option value="map">מיפוי / מפות</option><option value="carpet">שטיחים</option><option value="schedule">משימות מתוזמנות</option><option value="error">קוד שגיאה</option></select><input id="troubleCode" placeholder="קוד תקלה אם יש"><button class="btn" onclick="App.trouble()">מצא פתרון</button></div><div id="troubleResults" class="cards"></div>`}
function devicePage(){return `<h2>תיק המכשיר שלי</h2><div class="status" id="profileSummary"></div><div class="cards"><div class="card"><h3>פרטי שואב</h3><select id="devModel">${DATA.models.map(m=>`<option>${m[0]}</option>`).join('')}<option>אחר</option></select><input id="devSerial" placeholder="מספר סידורי"><input id="devPurchase" placeholder="תאריך קנייה"><input id="devWarranty" placeholder="אחריות"><input id="devFirmware" placeholder="גרסת Firmware"><textarea id="devNotes" placeholder="הערות"></textarea><button class="btn" onclick="App.saveProfile()">שמור</button></div><div class="card"><h3>הוספת תקלה להיסטוריה</h3><input id="faultDate" placeholder="תאריך"><input id="faultCode" placeholder="קוד תקלה"><textarea id="faultDesc" placeholder="מה קרה ומה עשית"></textarea><select id="faultStatus"><option>פתוח</option><option>טופל</option><option>נשלח לשירות</option></select><button class="btn" onclick="App.addFault()">שמור תקלה</button></div><div class="card"><h3>הוספת תזכורת</h3><input id="remPart" placeholder="חלק, לדוגמה פילטר"><input id="remEvery" placeholder="תדירות"><button class="btn" onclick="App.addReminder()">הוסף</button></div></div><h2>היסטוריית תקלות</h2><div class="cards">${state.faults.length?state.faults.map((f,i)=>`<div class="card"><h3>${f.code?f.code+' · ':''}${f.status}</h3><p>${f.desc}</p><p>${f.date}</p><button class="btn red" onclick="App.delFault(${i})">מחק</button></div>`).join(''):'<div class="card"><p>אין היסטוריית תקלות עדיין.</p></div>'}</div><h2>תזכורות תחזוקה</h2><div class="cards">${state.reminders.map((r,i)=>`<div class="card"><h3>🔔 ${r.part}</h3><p>תדירות: ${r.every}<br>בוצע לאחרונה: ${r.last||'לא סומן'}</p><button class="btn alt" onclick="App.doneReminder(${i})">סמן בוצע היום</button> <button class="btn red" onclick="App.delReminder(${i})">מחק</button></div>`).join('')}</div>`}
function fillDevice(){devModel.value=state.profile.model;devSerial.value=state.profile.serial;devPurchase.value=state.profile.purchaseDate;devWarranty.value=state.profile.warranty;devFirmware.value=state.profile.firmware;devNotes.value=state.profile.notes;profileSummary.innerHTML=`דגם: <b>${state.profile.model}</b> · Firmware: ${state.profile.firmware||'לא הוגדר'} · אחריות: ${state.profile.warranty||'לא הוגדר'}`}

(function(){

   localStorage.setItem('nh_admin_session', JSON.stringify(state.user));
 }

 function isAdmin(){
   return !!localStorage.getItem('nh_admin_session');
 }

   try{return JSON.parse(localStorage.getItem('nh_admin_session')||'null')}catch(e){return null}
 }

 window.AdminFix = {

       alert('שם משתמש או סיסמה לא נכונים');

   },

     localStorage.removeItem('nh_admin_session');
     if(typeof state !== 'undefined') state.user = null;
     render();
   },

     const data = {
       profile: JSON.parse(localStorage.getItem('nh_profile')||'null'),
       faults: JSON.parse(localStorage.getItem('nh_faults')||'[]'),
       reminders: JSON.parse(localStorage.getItem('nh_reminders')||'[]'),
       exportedAt: new Date().toISOString()
     };
     const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
     const a = document.createElement('a');
     a.href = URL.createObjectURL(blob);
     a.download = 'narwal-hub-backup.json';
     a.click();

     if(!confirm('למחוק את תיק המכשיר המקומי?')) return;

 function getUsers(){

   catch(e){return DEFAULT_USERS}
 }
 function saveUsers(users){localStorage.setItem('nh_admin_users',JSON.stringify(users))}
 function currentUser(){
   try{return JSON.parse(localStorage.getItem('nh_admin_session')||'null')}catch(e){return null}
 }

 window.UserAdmin={
   login(){
     const u=loginUser.value.trim();
     const p=loginPass.value;
     const user=getUsers().find(x=>x.username===u && x.password===p && x.status!=='חסום');
     if(!user){alert('שם משתמש או סיסמה לא נכונים');return}
     localStorage.setItem('nh_admin_session',JSON.stringify({name:user.name,username:user.username,role:user.role}));
     state.user={name:user.name,username:user.username,role:user.role};
     render();
   },
   add(){
     if(!newAdminName.value||!newAdminUser.value||!newAdminPass.value)return alert('צריך שם, משתמש וסיסמה');
     const users=getUsers();
     if(users.some(x=>x.username===newAdminUser.value.trim()))return alert('שם המשתמש כבר קיים');
     users.push({name:newAdminName.value.trim(),username:newAdminUser.value.trim(),password:newAdminPass.value,role:newAdminRole.value,status:'פעיל'});
     saveUsers(users); render();
   },
   reset(i){
     const users=getUsers();

     if(!p)return;
     users[i].password=p;
     saveUsers(users); render();
   },

     if(users[i].role==='Owner')return alert('לא ניתן לחסום Owner');
     users[i].status=users[i].status==='חסום'?'פעיל':'חסום';
     saveUsers(users); render();
   },

     const users=getUsers();
     if(users[i].role==='Owner')return alert('לא ניתן למחוק Owner');

     users.splice(i,1);
     saveUsers(users); render();
   },

     const cur=currentUser();

     if(!oldPass.value||!newPass.value)return alert('צריך סיסמה ישנה וחדשה');
     const users=getUsers();
     const u=users.find(x=>x.username===cur.username);

<script id="v38-personal-area-js">
(function(){
 if(window.__v38Personal)return; window.__v38Personal=true;

 const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}};
 const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

 const defaultDevices=[{
   id:'dev_'+Date.now(),
   name:'השואב שלי',
   model:'Narwal Flow 2',
   serial:'',
   purchaseDate:'',
   warrantyMonths:24,
   firmware:'',
   notes:'',
   faults:[],
   maintenance:[
     {task:'החלפת פילטר',everyDays:30,last:''},
     {task:'ניקוי רולר',everyDays:14,last:''},
     {task:'החלפת מברשות צד',everyDays:45,last:''},
     {task:'ניקוי חיישנים',everyDays:7,last:''}
   ]
 }];

 window.V76={
   devices:load('v38_devices',defaultDevices),
   activeId:localStorage.getItem('v38_active_device')||null,
   get active(){
     if(!this.activeId && this.devices[0]) this.activeId=this.devices[0].id;
     return this.devices.find(d=>d.id===this.activeId)||this.devices[0];
   },
   persist(){
     save('v38_devices',this.devices);
     if(this.activeId)localStorage.setItem('v38_active_device',this.activeId);
   },
   setActive(id){this.activeId=id;this.persist();render()},
   addDevice(){
     const d={...defaultDevices[0],id:'dev_'+Date.now(),name:'שואב נוסף',model:'Narwal Flow 2',serial:'',purchaseDate:'',firmware:'',notes:'',faults:[],maintenance:[
       {task:'החלפת פילטר',everyDays:30,last:''},
       {task:'ניקוי רולר',everyDays:14,last:''},
       {task:'החלפת מברשות צד',everyDays:45,last:''},
       {task:'ניקוי חיישנים',everyDays:7,last:''}
     ]};
     this.devices.push(d);this.activeId=d.id;this.persist();render();
   },
   deleteDevice(){
     if(this.devices.length<=1)return alert('צריך להשאיר לפחות שואב אחד');
     if(!confirm('למחוק את השואב הפעיל?'))return;
     this.devices=this.devices.filter(d=>d.id!==this.activeId);
     this.activeId=this.devices[0].id;this.persist();render();
   },
   saveDevice(){
     const d=this.active;
     d.name=devName.value;d.model=devModel.value;d.serial=devSerial.value;d.purchaseDate=devPurchase.value;d.warrantyMonths=Number(devWarrantyMonths.value||24);d.firmware=devFirmware.value;d.notes=devNotes.value;
     this.persist();alert('נשמר');render();
   },
   addFault(){
     const d=this.active;
     if(!faultDesc.value)return alert('צריך תיאור תקלה');
     d.faults.unshift({date:faultDate.value||new Date().toLocaleDateString('he-IL'),code:faultCode.value,desc:faultDesc.value,status:faultStatus.value});
     this.persist();render();
   },
   delFault(i){this.active.faults.splice(i,1);this.persist();render()},
   doneMaint(i){
     this.active.maintenance[i].last=new Date().toLocaleDateString('he-IL');
     this.persist();render();
   },
   addMaint(){
     if(!maintTask.value)return alert('צריך שם משימה');
     this.active.maintenance.push({task:maintTask.value,everyDays:Number(maintDays.value||30),last:''});
     this.persist();render();
   },
   delMaint(i){this.active.maintenance.splice(i,1);this.persist();render()},
   warrantyStatus(d){
     if(!d.purchaseDate)return {txt:'לא הוגדר תאריך קנייה',cls:'v38WarrantyWarn',days:null};
     const start=new Date(d.purchaseDate);
     if(isNaN(start))return {txt:'תאריך קנייה לא תקין',cls:'v38WarrantyWarn',days:null};
     const end=new Date(start);end.setMonth(end.getMonth()+Number(d.warrantyMonths||24));
     const days=Math.ceil((end-new Date())/86400000);
     if(days>=0)return {txt:'נותרו '+days+' ימים לאחריות',cls:'v38WarrantyOk',days};
     return {txt:'האחריות הסתיימה לפני '+Math.abs(days)+' ימים',cls:'v38WarrantyWarn',days};
   },
   nextMaintenance(d){
     let soon=null;
     d.maintenance.forEach(m=>{
       let daysLeft;
       if(!m.last)daysLeft=0;
       else{
         const last=new Date(m.last.split('.').reverse().join('-'));
         if(isNaN(last))daysLeft=0;

<script id="v44-video-admin-js">
(function(){
 if(window.__v44VideoAdmin)return; window.__v44VideoAdmin=true;

 const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(d))}catch(e){return d}};
 const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

 window.VideoAdmin = {
   get list(){
     return load('cms_videos', DATA.videos || []);
   },
   set list(v){
     save('cms_videos', v);
     DATA.videos = v;
   },
   add(){
     const title = prompt('שם הסרטון:');
     if(!title) return;
     const url = prompt('קישור לסרטון:');
     if(!url) return;
     const arr=this.list;
     arr.push([title,url]);
     this.list=arr;
     alert('הסרטון נוסף');
     render();
   },
   edit(i){
     const arr=this.list;
     const title=prompt('שם חדש:', arr[i][0]);
     if(!title) return;
     const url=prompt('קישור חדש:', arr[i][1]);
     if(!url) return;
     arr[i]=[title,url];
     this.list=arr;
     alert('עודכן');
     render();
   },
   del(i){
     const arr=this.list;
     if(!confirm('למחוק את הסרטון "'+arr[i][0]+'"?')) return;
     arr.splice(i,1);
     this.list=arr;
     alert('נמחק');
     render();
   },
   up(i){
     if(i<=0)return;
     const arr=this.list;
     [arr[i-1],arr[i]]=[arr[i],arr[i-1]];
     this.list=arr;
     render();
   },
   down(i){
     const arr=this.list;
     if(i>=arr.length-1)return;
     [arr[i+1],arr[i]]=[arr[i],arr[i+1]];
     this.list=arr;
     render();
   },
   pin(i){
     const arr=this.list;
     const item=arr.splice(i,1)[0];
     arr.unshift(item);
     this.list=arr;
     render();
   }
 };

 const oldListPage = window.listPage;
 if(oldListPage){
   window.listPage=function(title,arr,icon,open){
     if(title.includes('סרטונים')){
       const videos=VideoAdmin.list;
       return `<h2>סרטונים</h2>
       <div class="card"><button class="btn" onclick="VideoAdmin.add()">➕ הוסף סרטון</button></div>
       <div class="cards">${videos.map((v,i)=>`<div class="card">
         <h3>🎥 ${v[0]}</h3>
         <p><a target="_blank" href="${v[1]}">פתח סרטון</a></p>
         <div class="videoActions">
           <button class="btn alt" onclick="window.open('${v[1]}','_blank')">▶️ פתח</button>
           <button class="btn alt" onclick="VideoAdmin.edit(${i})">✏️ ערוך</button>
           <button class="btn red" onclick="VideoAdmin.del(${i})">🗑️ מחק</button>
           <button class="btn alt" onclick="VideoAdmin.pin(${i})">📌 נעץ</button>
           <button class="btn alt" onclick="VideoAdmin.up(${i})">⬆️</button>
           <button class="btn alt" onclick="VideoAdmin.down(${i})">⬇️</button>
         </div>
       </div>`).join('')}</div>`;
     }
     return oldListPage(title,arr,icon,open);
   };
 }

         <button class="btn alt" onclick="App.show('videos')">פתח עמוד סרטונים</button>
       </div>`;
   };
 }

 // Ensure DATA uses saved videos
 DATA.videos = VideoAdmin.list;
 render();
})();
</script>

<script id="v47-final-polish-js">
(function(){
 if(window.__v47FinalPolish)return; window.__v47FinalPolish=true;
 const CURRENT_VERSION='V76';
 const WA='972504546986';

 function cleanWhatsAppText(text){
   return String(text||'')
     .replace(/\\n/g, '\n')
     .replace(/\/n\//g, '\n')
     .replace(/\/n/g, '\n')
     .replace(/n\/n/g, '\n\n')
     .replace(/\r\n/g, '\n')
     .replace(/\n{3,}/g, '\n\n')
     .trim();
 }

 window.NarwalShare = {
   text: cleanWhatsAppText,
   open(text){
     const msg = cleanWhatsAppText(text);
     window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`, '_blank');
   },
   faq(q,a){
     this.open(`❓ ${cleanWhatsAppText(q)}

💡 תשובה:
${cleanWhatsAppText(a)}

📲 נשלח מ־Narwal Hub`);
   }
 };

 function patchWhatsappLinks(){
   // Fix every existing WhatsApp link before opening
   document.querySelectorAll('a[href*="wa.me"]').forEach(link=>{
     if(link.dataset.v47wa) return;
     link.dataset.v47wa='1';
     link.addEventListener('click', function(e){
       const href = link.getAttribute('href') || '';
       const m = href.match(/[?&]text=([^&]+)/);
       if(!m) return;
       e.preventDefault();
       let decoded='';
       try{ decoded = decodeURIComponent(m[1]); }catch(err){ decoded=m[1]; }
       NarwalShare.open(decoded);
     });
   });

   // Fix FAQ share specifically
   document.querySelectorAll('.faq').forEach(box=>{
     const q = box.querySelector('.q')?.textContent || '';
     const aNode = box.querySelector('.a');
     if(!aNode) return;
     const a = (aNode.textContent || '').replace('שתף ב-WhatsApp','').trim();
     aNode.querySelectorAll('a[href*="wa.me"]').forEach(link=>{
       link.textContent='שתף ב-WhatsApp';
       link.classList.add('whatsappShareBtn');
       link.onclick=function(e){
         e.preventDefault();
         NarwalShare.faq(q,a);
       };
     });
   });
 }

 function syncVersion(){
   document.querySelectorAll('h1,h2,h3,p,span,div,button').forEach(el=>{
     if(el.childNodes.length===1 && el.textContent){
       el.textContent = el.textContent.replace(/V76[0-9]/g, CURRENT_VERSION);
     }
   });
   const logo=document.querySelector('.logo');
   if(logo && !document.getElementById('finalVersionBadge')){
     const b=document.createElement('span');
     b.id='finalVersionBadge';
     b.className='finalBadge';
     b.textContent=CURRENT_VERSION;
     logo.appendChild(b);
   }
 }

 function liftSearch(){
   document.querySelectorAll('.globalSearchBox,.search').forEach(el=>{
     el.classList.add('quickSearchTop');
     const parent = el.closest('.card');
     if(parent) parent.classList.add('quickSearchTop');
   });
 }

 function removeDuplicateButtons(){
   const seen = new Set();
   document.querySelectorAll('#nav button').forEach(btn=>{
     const t = btn.textContent.trim();
     if(seen.has(t)) btn.remove();
     else seen.add(t);
   });
 }

 const oldRender = window.render;
 if(oldRender){
   window.render = function(){
     oldRender();
     setTimeout(()=>{
       patchWhatsappLinks();
       syncVersion();
       liftSearch();
       removeDuplicateButtons();
     },30);
   };
 }

 patchWhatsappLinks();
 syncVersion();
 liftSearch();
 removeDuplicateButtons();
})();
</script>

});

   document.querySelectorAll('#globalVersionBadge,#finalVersionBadge,.versionBadge,.finalBadge').forEach(x=>x.remove());

       el.textContent = el.textContent.replace(/V\s?4[0-9](?:\.1)?/g, VERSION);

   const page=document.querySelector('.page');

   const searchCard=[...document.querySelectorAll('.card')].find(c=>
     (c.textContent||'').includes('חיפוש מהיר בכל האתר') ||
     c.querySelector('.globalSearchBox') ||
     c.querySelector('.search')

   if(searchCard){

     const first=page.firstElementChild;
     if(first && first!==searchCard){
       page.insertBefore(searchCard, first.nextElementSibling || first);
     }
   }
 }

 if(oldRender){
   window.render=function(){
     oldRender();
     setTimeout(()=>{
       cleanVersionBadges();
       moveSearchUp();

 moveSearchUp();

 function syncVersion(){
   document.querySelectorAll('#v481VersionBadge,#finalVersionBadge,#globalVersionBadge,.versionBadge,.finalBadge').forEach(x=>x.remove());
   const logo=document.querySelector('.logo');
   if(logo && !document.getElementById('v49VersionBadge')){
     const b=document.createElement('span');
     b.id='v49VersionBadge';
     b.textContent=VERSION;
     logo.appendChild(b);
   }
   document.querySelectorAll('h1,h2,h3,p,span,div,button').forEach(el=>{
     if(el.childNodes.length===1 && el.textContent){
       el.textContent=el.textContent.replace(/V\s?4[0-9](?:\.\d+)?/g, VERSION);
     }
   });
 }

<script id="v51-admin-share-js">
(function(){
 if(window.__v51AdminShare)return; window.__v51AdminShare=true;
 const VERSION='V76';
 const WA='972504546986';

 function isAdmin(){
   return !!localStorage.getItem('nh_admin_session') || (window.state && state.user);
 }

 function syncVersion(){
   document.querySelectorAll('#v49VersionBadge,#v481VersionBadge,#finalVersionBadge,#globalVersionBadge,.versionBadge,.finalBadge').forEach(x=>x.remove());
   const logo=document.querySelector('.logo');
   if(logo && !document.getElementById('v51VersionBadge')){
     const b=document.createElement('span');
     b.id='v51VersionBadge';
     b.textContent=VERSION;
     logo.appendChild(b);
   }
   document.querySelectorAll('h1,h2,h3,p,span,div,button').forEach(el=>{
     if(el.childNodes.length===1 && el.textContent){
       el.textContent = el.textContent.replace(/V\s?4[0-9](?:\.\d+)?|V\s?50(?:\.1)?/g, VERSION);
     }
   });
 }

 function ensureEditModal(){
   if(document.getElementById('editModalOverlay'))return;
   const o=document.createElement('div');
   o.id='editModalOverlay';
   o.className='editModalOverlay';
   o.onclick=closeEditModal;
   const m=document.createElement('div');
   m.id='editModal';
   m.className='editModal';
   document.body.appendChild(o);
   document.body.appendChild(m);
 }
 window.closeEditModal=function(){
   document.getElementById('editModalOverlay')?.classList.remove('open');
   document.getElementById('editModal')?.classList.remove('open');
 };

 function saveData(key,value){
   localStorage.setItem(key,JSON.stringify(value));
   if(key==='cms_faq')DATA.faq=value;
   if(key==='cms_errors')DATA.errors=value;
   if(key==='cms_videos')DATA.videos=value;
   if(key==='cms_downloads')DATA.downloads=value;
   if(key==='cms_models')DATA.models=value;
 }

 function cleanText(t){
   return String(t||'').replace(/\\n/g,'\n').replace(/\/n\//g,'\n').replace(/\n{3,}/g,'\n\n').trim();
 }

 function shareFix(type,idx){
   const item = getItem(type,idx);
   if(!item)return;
   const link = `${location.origin}${location.pathname}#fix=${encodeURIComponent(type)}:${idx}`;
   const text = `🔧 פתרון מתוך Narwal Hub

${item.title}

${cleanText(item.body)}

קישור ישיר:
${link}`;
   window.open(`https://wa.me/${WA}?text=${encodeURIComponent(text)}`,'_blank');
 }

 function copyFixLink(type,idx){
   const link = `${location.origin}${location.pathname}#fix=${encodeURIComponent(type)}:${idx}`;
   navigator.clipboard?.writeText(link);
   alert('הקישור הועתק');
 }

 function getItem(type,idx){
   if(type==='FAQ'){let x=DATA.faq[idx];return x&&{title:x[1],body:x[2]};}
   if(type==='תקלה'){let x=DATA.errors[idx];return x&&{title:x[0]+' · '+x[1],body:x[2]};}
   if(type==='דגם'){let x=DATA.models[idx];return x&&{title:x[0],body:x.join(' · ')};}
   if(type==='סרטון'){let x=DATA.videos[idx];return x&&{title:x[0],body:x[1]};}
   if(type==='הורדה'){let x=DATA.downloads[idx];return x&&{title:x[0],body:x[1]};}
 }

 window.V76Edit={
   open(type,idx){
     ensureEditModal();
     const modal=document.getElementById('editModal');
     const item=getItem(type,idx);
     if(!item)return;
     let fields='';
     if(type==='FAQ'){
       let x=DATA.faq[idx];
       fields=`<input id="editCat" value="${x[0]||''}" placeholder="קטגוריה"><input id="editTitle" value="${x[1]||''}" placeholder="שאלה"><textarea id="editBody">${x[2]||''}</textarea>`;
     } else if(type==='תקלה'){
       let x=DATA.errors[idx];
       fields=`<input id="editCode" value="${x[0]||''}" placeholder="קוד"><input id="editTitle" value="${x[1]||''}" placeholder="כותרת"><textarea id="editBody">${x[2]||''}</textarea>`;
     } else {
       fields=`<input id="editTitle" value="${item.title||''}" placeholder="כותרת"><textarea id="editBody">${item.body||''}</textarea>`;
     }
     modal.innerHTML=`<h2>עריכה: ${type}</h2>${fields}
       <div class="fixLinkBox">קישור תיקון ישיר ישלח את המשתמש ישר לפריט הזה באתר.</div>
       <div class="editActions">
         <button class="btn" onclick="V76Edit.save('${type}',${idx})">💾 שמור</button>
         <button class="btn red" onclick="V76Edit.del('${type}',${idx})">🗑️ מחק</button>
         <button class="btn alt" onclick="V76Edit.preview('${type}',${idx})">👁️ פתח במקום</button>
         <button class="btn alt" onclick="V76Edit.copy('${type}',${idx})">🔗 העתק קישור</button>
         <button class="btn alt" onclick="V76Edit.share('${type}',${idx})">📤 שתף תיקון</button>
         <button class="btn alt" onclick="closeEditModal()">סגור</button>
       </div>`;
     document.getElementById('editModalOverlay').classList.add('open');
     modal.classList.add('open');
   },
   save(type,idx){
     if(type==='FAQ'){
       DATA.faq[idx]=[editCat.value,editTitle.value,editBody.value];
       saveData('cms_faq',DATA.faq);
     } else if(type==='תקלה'){
       DATA.errors[idx]=[editCode.value,editTitle.value,editBody.value];
       saveData('cms_errors',DATA.errors);
     } else if(type==='דגם'){
       DATA.models[idx][0]=editTitle.value;
       DATA.models[idx][7]=editBody.value;
       saveData('cms_models',DATA.models);
     } else if(type==='סרטון'){
       DATA.videos[idx]=[editTitle.value,editBody.value];
       saveData('cms_videos',DATA.videos);
     } else if(type==='הורדה'){
       DATA.downloads[idx]=[editTitle.value,editBody.value];
       saveData('cms_downloads',DATA.downloads);
     }
     alert('נשמר');
     closeEditModal();
     render();
   },
   del(type,idx){
     if(!confirm('למחוק את הפריט?'))return;
     if(type==='FAQ'){DATA.faq.splice(idx,1);saveData('cms_faq',DATA.faq);}
     if(type==='תקלה'){DATA.errors.splice(idx,1);saveData('cms_errors',DATA.errors);}
     if(type==='דגם'){DATA.models.splice(idx,1);saveData('cms_models',DATA.models);}
     if(type==='סרטון'){DATA.videos.splice(idx,1);saveData('cms_videos',DATA.videos);}
     if(type==='הורדה'){DATA.downloads.splice(idx,1);saveData('cms_downloads',DATA.downloads);}
     closeEditModal();render();
   },
   preview(type,idx){closeEditModal();SearchJump.goToResult(type,idx);},
   copy:type=>{},
   share:shareFix,
   copy(type,idx){copyFixLink(type,idx);}
 };

 function simpleGo(type,index){
   if(type==='FAQ'){App.show('faq');setTimeout(()=>{let el=[...document.querySelectorAll('.faq')][index];if(el){el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'center'});}},120);}
   if(type==='תקלה'){App.show('errors');setTimeout(()=>{let code=(DATA.errors[index]||[])[0];let el=[...document.querySelectorAll('.card')].find(c=>c.textContent.includes(code));if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},120);}

   if(type==='סרטון'){App.show('videos');setTimeout(()=>{let title=(DATA.videos[index]||[])[0];let el=[...document.querySelectorAll('.card')].find(c=>c.textContent.includes(title));if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},120);}

 }

 window.SearchJump = window.SearchJump || {};
 window.SearchJump.goToResult = function(type,idx){
   if(isAdmin()) V76Edit.open(type,idx);
   else simpleGo(type,idx);
 };

 window.LiveSearch = function(inp,res){
   const q=inp.value.trim().toLowerCase();
   if(!q){res.innerHTML='';return;}
   const arr=[];
   (DATA.faq||[]).forEach((x,i)=>arr.push({type:'FAQ',idx:i,title:x[1],body:x[2]}));
   (DATA.errors||[]).forEach((x,i)=>arr.push({type:'תקלה',idx:i,title:x[0]+' · '+x[1],body:x[2]}));
   (DATA.models||[]).forEach((x,i)=>arr.push({type:'דגם',idx:i,title:x[0],body:x.join(' · ')}));
   (DATA.videos||[]).forEach((x,i)=>arr.push({type:'סרטון',idx:i,title:x[0],body:x[1]}));
   (DATA.downloads||[]).forEach((x,i)=>arr.push({type:'הורדה',idx:i,title:x[0],body:x[1]}));
   const list=arr.filter(x=>(x.title+' '+x.body).toLowerCase().includes(q)).slice(0,12);
   res.innerHTML=list.length?list.map(x=>`<div class="liveResult" onclick="SearchJump.goToResult('${x.type}',${x.idx})"><b>[${x.type}] ${x.title}</b><div>${x.body}</div></div>`).join(''):'<div class="liveResult">לא נמצאו תוצאות</div>';
 };

 function handleFixHash(){
   const h=decodeURIComponent(location.hash||'');
   if(!h.startsWith('#fix='))return;
   const [type,idx]=h.replace('#fix=','').split(':');
   setTimeout(()=>simpleGo(type,Number(idx)),300);
 }

 const oldRender=window.render;
 window.render=function(){
   oldRender();
   setTimeout(syncVersion,30);
 };

 window.addEventListener('hashchange',handleFixHash);
 syncVersion();
 handleFixHash();
})();

 function ensureModal(){
   if(document.getElementById('editModalOverlay'))return;
   const o=document.createElement('div');o.id='editModalOverlay';o.className='editModalOverlay';o.onclick=()=>closeEditModal();
   const m=document.createElement('div');m.id='editModal';m.className='editModal';
   document.body.appendChild(o);document.body.appendChild(m);
 }
 window.closeEditModal=function(){document.getElementById('editModalOverlay')?.classList.remove('open');document.getElementById('editModal')?.classList.remove('open')}

 function saveKey(key,value){localStorage.setItem(key,JSON.stringify(value));}
 function getItem(type,idx){
   if(type==='FAQ'){let x=DATA.faq[idx];return x&&{title:x[1],body:x[2]}}
   if(type==='תקלה'){let x=DATA.errors[idx];return x&&{title:x[0]+' · '+x[1],body:x[2]}}
   if(type==='דגם'){let x=DATA.models[idx];return x&&{title:x[0],body:x.join(' · ')}}
   if(type==='סרטון'){let x=DATA.videos[idx];return x&&{title:x[0],body:x[1]}}
   if(type==='הורדה'){let x=DATA.downloads[idx];return x&&{title:x[0],body:x[1]}}
 }

 window.V76Edit={
   open(type,idx){
     ensureModal();
     const item=getItem(type,idx); if(!item)return;
     let fields='';
     if(type==='FAQ'){let x=DATA.faq[idx]; fields=`<input id="editCat" value="${x[0]||''}" placeholder="קטגוריה"><input id="editTitle" value="${x[1]||''}" placeholder="שאלה"><textarea id="editBody">${x[2]||''}</textarea>`}
     else if(type==='תקלה'){let x=DATA.errors[idx]; fields=`<input id="editCode" value="${x[0]||''}" placeholder="קוד"><input id="editTitle" value="${x[1]||''}" placeholder="כותרת"><textarea id="editBody">${x[2]||''}</textarea>`}
     else fields=`<input id="editTitle" value="${item.title||''}" placeholder="כותרת"><textarea id="editBody">${item.body||''}</textarea>`;
     editModal.innerHTML=`<h2>עריכה: ${type}</h2>${fields}<div class="editActions"><button class="btn" onclick="V76Edit.save('${type}',${idx})">💾 שמור</button><button class="btn red" onclick="V76Edit.del('${type}',${idx})">🗑️ מחק</button><button class="btn alt" onclick="V76Edit.share('${type}',${idx},true)">📤 שתף קישור עריכה</button><button class="btn alt" onclick="V76Edit.share('${type}',${idx},false)">🔗 שתף פתרון</button><button class="btn alt" onclick="closeEditModal()">סגור</button></div>`;
     editModalOverlay.classList.add('open');editModal.classList.add('open');
   },
   save(type,idx){
     if(type==='FAQ'){DATA.faq[idx]=[editCat.value,editTitle.value,editBody.value];saveKey('cms_faq',DATA.faq)}
     else if(type==='תקלה'){DATA.errors[idx]=[editCode.value,editTitle.value,editBody.value];saveKey('cms_errors',DATA.errors)}
     else if(type==='דגם'){DATA.models[idx][0]=editTitle.value;DATA.models[idx][7]=editBody.value;saveKey('cms_models',DATA.models)}
     else if(type==='סרטון'){DATA.videos[idx]=[editTitle.value,editBody.value];saveKey('cms_videos',DATA.videos)}
     else if(type==='הורדה'){DATA.downloads[idx]=[editTitle.value,editBody.value];saveKey('cms_downloads',DATA.downloads)}
     alert('נשמר');closeEditModal();render();
   },
   del(type,idx){
     if(!confirm('למחוק?'))return;
     if(type==='FAQ'){DATA.faq.splice(idx,1);saveKey('cms_faq',DATA.faq)}
     if(type==='תקלה'){DATA.errors.splice(idx,1);saveKey('cms_errors',DATA.errors)}
     if(type==='דגם'){DATA.models.splice(idx,1);saveKey('cms_models',DATA.models)}
     if(type==='סרטון'){DATA.videos.splice(idx,1);saveKey('cms_videos',DATA.videos)}
     if(type==='הורדה'){DATA.downloads.splice(idx,1);saveKey('cms_downloads',DATA.downloads)}
     closeEditModal();render();
   },
   share(type,idx,edit){
     const it=getItem(type,idx); if(!it)return;
     const hash=(edit?'#edit=':'#fix=')+encodeURIComponent(type)+':'+idx;
     const link=location.origin+location.pathname+hash;
     const text=`${edit?'✏️ קישור לעריכה':'🔧 פתרון מתוך Narwal Hub'}

${it.title}

${clean(it.body)}

${link}`;
     window.open(`https://wa.me/${WA}?text=${encodeURIComponent(text)}`,'_blank');
   }
 };

 function publicGo(type,index){
   if(type==='FAQ'){App.show('faq');setTimeout(()=>{let el=[...document.querySelectorAll('.faq')][index];if(el){el.classList.add('open');el.scrollIntoView({behavior:'smooth',block:'center'})}},120)}
   if(type==='תקלה'){App.show('errors');setTimeout(()=>{let code=(DATA.errors[index]||[])[0];let el=[...document.querySelectorAll('.card')].find(c=>c.textContent.includes(code));if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},120)}
   if(type==='דגם'){App.show('models');setTimeout(()=>{let n=(DATA.models[index]||[])[0];let el=[...document.querySelectorAll('.card')].find(c=>c.textContent.includes(n));if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},120)}
   if(type==='סרטון'){App.show('videos');setTimeout(()=>{let n=(DATA.videos[index]||[])[0];let el=[...document.querySelectorAll('.card')].find(c=>c.textContent.includes(n));if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},120)}
   if(type==='הורדה'){App.show('downloads');setTimeout(()=>{let n=(DATA.downloads[index]||[])[0];let el=[...document.querySelectorAll('.card')].find(c=>c.textContent.includes(n));if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},120)}
 }
 window.SearchJump=window.SearchJump||{};
 window.SearchJump.goToResult=function(type,idx){isAdmin()?V76Edit.open(type,idx):publicGo(type,idx)};

 window.LiveSearch=function(inp,res){
   const q=inp.value.trim().toLowerCase(); if(!q){res.innerHTML='';return}
   const arr=[];
   (DATA.faq||[]).forEach((x,i)=>arr.push({type:'FAQ',idx:i,title:x[1],body:x[2]}));
   (DATA.errors||[]).forEach((x,i)=>arr.push({type:'תקלה',idx:i,title:x[0]+' · '+x[1],body:x[2]}));
   (DATA.models||[]).forEach((x,i)=>arr.push({type:'דגם',idx:i,title:x[0],body:x.join(' · ')}));
   (DATA.videos||[]).forEach((x,i)=>arr.push({type:'סרטון',idx:i,title:x[0],body:x[1]}));
   (DATA.downloads||[]).forEach((x,i)=>arr.push({type:'הורדה',idx:i,title:x[0],body:x[1]}));
   const list=arr.filter(x=>(x.title+' '+x.body).toLowerCase().includes(q)).slice(0,8);
   res.innerHTML=list.length?list.map(x=>`<div class="liveResult" onclick="SearchJump.goToResult('${x.type}',${x.idx})"><b>[${x.type}] ${x.title}</b><div>${x.body}</div></div>`).join(''):'<div class="liveResult">לא נמצאו תוצאות</div>';
 };

 function addFaqEditButtons(){
   if(!isAdmin())return;
   document.querySelectorAll('.faq').forEach((box,i)=>{
     if(box.querySelector('.faqAdminActions'))return;
     const actions=document.createElement('div');actions.className='faqAdminActions';
     actions.innerHTML=`<button class="btn alt" onclick="V76Edit.open('FAQ',${i})">✏️ ערוך</button><button class="btn red" onclick="V76Edit.del('FAQ',${i})">🗑️ מחק</button><button class="btn alt" onclick="V76Edit.share('FAQ',${i},false)">📤 שתף פתרון</button>`;
     box.appendChild(actions);
   });
 }

 function fixSearchBox(){
   const input=document.querySelector('.globalSearchBox input,.search input');
   if(!input)return;
   const wrap=input.closest('.globalSearchBox,.search');
   let box=wrap.querySelector('.liveSearchResults');
   if(!box){box=document.createElement('div');box.className='liveSearchResults';wrap.appendChild(box)}
   input.oninput=()=>LiveSearch(input,box);
 }

 function handleHash(){
   const h=decodeURIComponent(location.hash||'');
   if(!h)return;
   const isEdit=h.startsWith('#edit='), isFix=h.startsWith('#fix=');
   if(!isEdit&&!isFix)return;
   const [type,idx]=h.replace('#edit=','').replace('#fix=','').split(':');
   setTimeout(()=>{isEdit&&isAdmin()?V76Edit.open(type,Number(idx)):publicGo(type,Number(idx))},400);
 }

 const oldRender=window.render;
 window.render=function(){oldRender();setTimeout(()=>{syncVersion();fixSearchBox();addFaqEditButtons();},40)};
 window.addEventListener('hashchange',handleHash);
 syncVersion();fixSearchBox();addFaqEditButtons();handleHash();
})();
</script>


<script id="v53-download-fix-js">
(function(){
 if(window.__v53Downloads)return; window.__v53Downloads=true;
 const VERSION='V76';

 function syncVersion(){
   document.querySelectorAll('#v52VersionBadge,#v51VersionBadge,#v49VersionBadge,#v481VersionBadge,#finalVersionBadge,#globalVersionBadge,.versionBadge,.finalBadge').forEach(x=>x.remove());
   const logo=document.querySelector('.logo');
   if(logo&&!document.getElementById('v53VersionBadge')){
     const b=document.createElement('span');b.id='v53VersionBadge';b.textContent=VERSION;logo.appendChild(b);
   }
   document.querySelectorAll('h1,h2,h3,p,span,div,button').forEach(el=>{
     if(el.childNodes.length===1&&el.textContent)el.textContent=el.textContent.replace(/V\s?\d+(?:\.\d+)?/g,VERSION);
   });
 }

 function safeOpen(url){
   url = String(url||'').trim();
   if(!url || url==='#'){ alert('לא הוגדר קישור לפריט הזה'); return; }
   if(!/^https?:\/\//i.test(url)){ alert('הקישור לא תקין. צריך להתחיל ב-http או https'); return; }
   window.open(url, '_blank', 'noopener,noreferrer');
 }
 window.DownloadFix={open:safeOpen};

 function renderDownloads(){
   if(typeof state==='undefined' || state.page!=='downloads')return;
   const downloads = (DATA.downloads||[]);
   app.innerHTML = `<section class="page"><h2>הורדות וקישורים רשמיים</h2>
     <div class="cards">${downloads.map((d,i)=>`<div class="card">
       <h3>📱 ${d[0]||'קישור'}</h3>
       <p>${d[1]?`<span style="word-break:break-all">${d[1]}</span>`:'לא הוגדר קישור'}</p>
       <div class="downloadActions">
         <button class="btn" onclick="DownloadFix.open('${String(d[1]||'').replace(/'/g,"\\'")}')">פתח קישור</button>
         ${typeof V76Edit!=='undefined'?`<button class="btn alt" onclick="V76Edit.open('הורדה',${i})">✏️ ערוך</button>`:''}
       </div>
     </div>`).join('')}</div></section>`;
 }

 const oldListPage = window.listPage;
 if(oldListPage){
   window.listPage=function(title,arr,icon,open){
     if(String(title).includes('הורדות')){
       return `<h2>הורדות וקישורים רשמיים</h2>
       <div class="cards">${(DATA.downloads||[]).map((d,i)=>`<div class="card">
         <h3>📱 ${d[0]||'קישור'}</h3>
         <p>${d[1]?`<span style="word-break:break-all">${d[1]}</span>`:'לא הוגדר קישור'}</p>
         <div class="downloadActions">
          <button class="btn" onclick="DownloadFix.open('${String(d[1]||'').replace(/'/g,"\\'")}')">פתח קישור</button>
          ${typeof V76Edit!=='undefined'?`<button class="btn alt" onclick="V76Edit.open('הורדה',${i})">✏️ ערוך</button>`:''}
         </div>
       </div>`).join('')}</div>`;
     }
     return oldListPage(title,arr,icon,open);
   };
 }

 const oldRender=window.render;
 window.render=function(){
   oldRender();
   setTimeout(()=>{syncVersion();renderDownloads();},30);
 };

 syncVersion();
 renderDownloads();
})();
</script>

 function isAdmin(){
   try {
     const s=JSON.parse(localStorage.getItem('nh_admin_session')||'null');
     return !!(s && (s.role==='Owner'||s.role==='Admin'||s.role==='Moderator'||s.name));
   } catch(e){ return false; }
 }

 function applyAdminMode(){
   document.body.classList.toggle('admin-mode', isAdmin());
 }

 function syncVersion(){
   document.querySelectorAll('#v53VersionBadge,#v52VersionBadge,#v51VersionBadge,#v49VersionBadge,#v481VersionBadge,#finalVersionBadge,#globalVersionBadge,.versionBadge,.finalBadge').forEach(x=>x.remove());
   const logo=document.querySelector('.logo');
   if(logo&&!document.getElementById('v54VersionBadge')){
     const b=document.createElement('span');b.id='v54VersionBadge';b.textContent=VERSION;logo.appendChild(b);
   }
   document.querySelectorAll('h1,h2,h3,p,span,div,button').forEach(el=>{
     if(el.childNodes.length===1&&el.textContent)el.textContent=el.textContent.replace(/V\s?\d+(?:\.\d+)?/g,VERSION);
   });
 }

 function fixImages(){
   const hero=document.querySelector('.homeHeroImage');
   if(hero){
     hero.style.backgroundImage=`linear-gradient(180deg,rgba(8,8,21,.05),rgba(8,8,21,.18)),url('${IMAGES['Narwal Flow 2']}')`;
     hero.style.setProperty('--hero-img',`url('${IMAGES['Narwal Flow 2']}')`);
   }
   document.querySelectorAll('.productPhoto,.modelHeroImg,.modelImageFixed,.gallery div').forEach(el=>{
     const txt=(el.closest('.card')?.textContent || el.closest('.page')?.textContent || '');
     Object.keys(IMAGES).forEach(model=>{
       if(txt.includes(model)) {
         el.style.backgroundImage=`url('${IMAGES[model]}')`;
         el.style.backgroundColor='#fff';
       }
     });
   });
 }

 function removeAdminButtonsForUsers(){
   applyAdminMode();
   if(isAdmin())return;
   document.querySelectorAll('button').forEach(btn=>{
     const t=btn.textContent||'';
     const oc=btn.getAttribute('onclick')||'';
     if(/ערוך|מחק|נעץ|הוסף|איפוס|שמור/.test(t) && /VideoAdmin|CMSAdmin|V\d+Edit|edit|del|delete|pin|add|save/i.test(oc)){
       btn.style.display='none';
     }
   });
 }

 function stableLiveSearch(){
   const input=document.querySelector('.globalSearchBox input,.search input');
   if(!input)return;
   const wrap=input.closest('.globalSearchBox,.search');
   if(!wrap)return;
   wrap.style.position='relative';
   wrap.style.overflow='visible';
   let box=wrap.querySelector('.liveSearchResults');
   if(!box){ box=document.createElement('div'); box.className='liveSearchResults'; wrap.appendChild(box); }
   input.oninput=function(){
     const q=input.value.trim().toLowerCase();
     if(!q){box.innerHTML='';return;}
     const arr=[];
     (DATA.faq||[]).forEach((x,i)=>arr.push({type:'FAQ',idx:i,title:x[1],body:x[2]}));
     (DATA.errors||[]).forEach((x,i)=>arr.push({type:'תקלה',idx:i,title:x[0]+' · '+x[1],body:x[2]}));
     (DATA.models||[]).forEach((x,i)=>arr.push({type:'דגם',idx:i,title:x[0],body:x.join(' · ')}));
     (DATA.videos||[]).forEach((x,i)=>arr.push({type:'סרטון',idx:i,title:x[0],body:x[1]}));
     (DATA.downloads||[]).forEach((x,i)=>arr.push({type:'הורדה',idx:i,title:x[0],body:x[1]}));
     const list=arr.filter(x=>(x.title+' '+x.body).toLowerCase().includes(q)).slice(0,8);
     box.innerHTML=list.length?list.map(x=>`<div class="liveResult" onclick="SearchJump&&SearchJump.goToResult?SearchJump.goToResult('${x.type}',${x.idx}):null"><b>[${x.type}] ${x.title}</b><div>${x.body}</div></div>`).join(''):'<div class="liveResult">לא נמצאו תוצאות</div>';
   };
 }

 function addCloudWarning(){
   if(document.getElementById('v54CloudWarn'))return;
   if(!isAdmin())return;
   const page=document.querySelector('.page');
   if(!page || state?.page!=='admin')return;
   page.insertAdjacentHTML('afterbegin',`<div id="v54CloudWarn" class="v54CloudWarn">⚠️ חשוב: הוספה/מחיקה כרגע נשמרת מקומית בדפדפן. כדי שכל המכשירים יראו מחיקה/הוספה בלייב צריך לחבר Firebase אמיתי עם פרטי הפרויקט.</div>`);
 }

 const oldRender=window.render;
 if(oldRender){
   window.render=function(){
     oldRender();
     setTimeout(()=>{syncVersion();fixImages();removeAdminButtonsForUsers();stableLiveSearch();addCloudWarning();},40);
   };
 }

 syncVersion();fixImages();removeAdminButtonsForUsers();stableLiveSearch();addCloudWarning();
})();
</script>

 window.CloudNow = {
  db:null, ready:false, applying:false,
  keys:{faq:'cms_faq',errors:'cms_errors',videos:'cms_videos',downloads:'cms_downloads',models:'cms_models',firmware:'fw_versions'},
  init(){
   try {
    if(!window.firebase) throw new Error('firebase scripts not loaded');
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    this.db=firebase.database();
    this.ready=true;
    this.listen();
    this.patchStorage();
   } catch(e) {
    console.error(e); this.ready=false;
   }
   this.status();
  },
  listen(){
   Object.keys(this.keys).forEach(key=>{
    this.db.ref('narwalHub/content/'+key).on('value',snap=>{
      const val=snap.val();
      if(!val || !Array.isArray(val.items)) return;
      this.applying=true;
      localStorage.setItem(this.keys[key],JSON.stringify(val.items));
      if(key==='faq')DATA.faq=val.items;
      if(key==='errors')DATA.errors=val.items;
      if(key==='videos')DATA.videos=val.items;
      if(key==='downloads')DATA.downloads=val.items;
      if(key==='models')DATA.models=val.items;
      this.applying=false;
      setTimeout(()=>window.render&&render(),30);
    });
   });
  },
  saveKey(localKey,items){
   if(!this.ready || this.applying)return;
   const remote=Object.entries(this.keys).find(([k,v])=>v===localKey)?.[0];
   if(!remote)return;
   this.db.ref('narwalHub/content/'+remote).set({items:items||[],updatedAt:Date.now()});
  },
  patchStorage(){
   if(window.__v58StoragePatched)return;
   window.__v58StoragePatched=true;
   const original=localStorage.setItem.bind(localStorage);
   localStorage.setItem=(k,v)=>{
    original(k,v);
    if(this.applying)return;
    if(Object.values(this.keys).includes(k)){
      try{this.saveKey(k,JSON.parse(v));}catch(e){}
    }
   };
  },
  pushAll(){
   this.saveKey('cms_faq',DATA.faq||[]);
   this.saveKey('cms_errors',DATA.errors||[]);
   this.saveKey('cms_videos',DATA.videos||[]);
   this.saveKey('cms_downloads',DATA.downloads||[]);
   this.saveKey('cms_models',DATA.models||[]);
   try{this.saveKey('fw_versions',JSON.parse(localStorage.getItem('fw_versions')||'[]'));}catch(e){}
   alert('הועלה לענן. עכשיו מחיקה/הוספה אמורה להתעדכן במכשירים אחרים.');
  },
  status(){
   const old=document.getElementById('v58CloudStatus'); if(old)old.remove();
   if(!window.state || state.page!=='admin')return;
   const page=document.querySelector('.page'); if(!page)return;
   const div=document.createElement('div');div.id='v58CloudStatus';div.className='v58CloudBox '+(this.ready?'':'warn');
   div.innerHTML=this.ready?'✅ מחובר ל-Firebase Realtime Database.<br><button class="btn alt" onclick="CloudNow.pushAll()">העלה תוכן קיים לענן</button>':'⚠️ לא מחובר ל-Firebase. בדוק Realtime Database / Rules.';
   page.insertAdjacentElement('afterbegin',div);
  }
 };

 function patchVideoAdmin(){
  // Force video deletes/adds to write cloud immediately, even if old code only updates local
  if(!window.VideoAdmin || VideoAdmin.__v58patched)return;
  VideoAdmin.__v58patched=true;
  const oldDel=VideoAdmin.del?.bind(VideoAdmin);
  VideoAdmin.del=function(i){
   const arr=this.list||DATA.videos||[];
   if(!confirm('למחוק את הסרטון "'+(arr[i]?.[0]||'')+'"?'))return;
   arr.splice(i,1);
   this.list=arr;
   DATA.videos=arr;
   localStorage.setItem('cms_videos',JSON.stringify(arr));
   CloudNow.saveKey('cms_videos',arr);
   render();
  };
  ['add','edit','pin','up','down'].forEach(fn=>{
    if(typeof VideoAdmin[fn]==='function'){
      const old=VideoAdmin[fn].bind(VideoAdmin);
      VideoAdmin[fn]=function(...args){const r=old(...args);setTimeout(()=>CloudNow.saveKey('cms_videos',VideoAdmin.list||DATA.videos||[]),80);return r;};
    }
  });
 }

 function renderStableModels(){
  if(!window.state || state.page!=='models' || !window.DATA || !window.app)return;
  app.innerHTML=`<section class="page"><h2>קטלוג דגמים</h2><div class="cards">${(DATA.models||[]).map((m,i)=>`<div class="card"><div class="modelImageV76" style="background-image:url('${IMAGES[m[0]]||IMAGES["Narwal Flow 2"]}')"></div><h3>${m[0]}</h3><p>${m[7]||''}</p><button class="btn" onclick="V76&&V76.openModel?V76.openModel(${i}):null">פרטים מלאים</button><button class="btn alt" onclick="App.show('compare')">השווה</button></div>`).join('')}</div></section>`;
 }

 const oldRender=window.render;
 window.render=function(){
  oldRender();
  setTimeout(()=>{document.body.classList.toggle('admin-mode',isAdmin());version();fixImages();patchVideoAdmin();renderStableModels();CloudNow.status();},60);
 };

 setTimeout(()=>CloudNow.init(),350);
 document.body.classList.toggle('admin-mode',isAdmin());version();fixImages();
})();

     const url=(document.getElementById('newVideoUrl')?.value||'').trim();
     if(!title) return alert('צריך שם לסרטון');
     if(!url || !/^https?:\/\//i.test(url)) return alert('צריך קישור תקין שמתחיל ב-http או https');
     const arr=[...(DATA.videos||[])];
     arr.unshift([title,url]);
     saveVideos(arr);
     alert('הסרטון נוסף וסונכרן לענן');
     render();
   },
   del(i){
     const arr=[...(DATA.videos||[])];
     if(!confirm('למחוק את הסרטון "'+(arr[i]?.[0]||'')+'"?')) return;
     arr.splice(i,1);
     saveVideos(arr);
     render();
   },
   edit(i){
     const arr=[...(DATA.videos||[])];
     const title=prompt('שם הסרטון:',arr[i]?.[0]||'');
     if(!title)return;
     const url=prompt('קישור:',arr[i]?.[1]||'');
     if(!url)return;
     arr[i]=[title,url];
     saveVideos(arr);
     render();
   },
   open(url){
     if(!url || !/^https?:\/\//i.test(url)) return alert('קישור לא תקין');
     window.open(url,'_blank','noopener,noreferrer');
   }
 };

 function renderVideosPage(){
   if(!window.state || state.page!=='videos') return;
   const admin=isAdmin();
   const videos=DATA.videos||[];
   app.innerHTML=`<section class="page"><h2>סרטונים</h2>
     ${admin?`<div class="card"><button class="btn" onclick="VideoAddFix.show()">➕ הוסף סרטון</button>
       <div id="videoAddBox" class="v59VideoForm" style="display:none">
         <input id="newVideoTitle" placeholder="שם הסרטון">
         <input id="newVideoUrl" placeholder="קישור YouTube">
         <button class="btn" onclick="VideoAddFix.add()">שמור סרטון</button>
       </div>
     </div>`:''}
     <div class="cards">${videos.map((v,i)=>`<div class="card">
       <h3>🎥 ${v[0]||'סרטון'}</h3>
       <p><button class="btn alt" onclick="VideoAddFix.open('${String(v[1]||'').replace(/'/g,"\\'")}')">פתח סרטון</button></p>
       ${admin?`<div class="videoActions"><button class="btn alt" onclick="VideoAddFix.edit(${i})">✏️ ערוך</button><button class="btn red" onclick="VideoAddFix.del(${i})">🗑️ מחק</button></div>`:''}
     </div>`).join('')}</div></section>`;
 }

 const oldRender=window.render;
 window.render=function(){
   oldRender();
   setTimeout(()=>{syncVersion();renderVideosPage();},40);
 };

 // Patch any old VideoAdmin.add that was broken
 window.VideoAdmin = window.VideoAdmin || {};
 window.VideoAdmin.add = function(){ App.show('videos'); setTimeout(()=>VideoAddFix.show(),80); };

 syncVersion();
 renderVideosPage();
})();
</script>

 function isAdmin(){
  try{const s=JSON.parse(localStorage.getItem('nh_admin_session')||'null');return !!(s&&(s.role||s.name||s.username));}catch(e){return false}
 }

 function saveVideos(arr){
  DATA.videos=arr;
  localStorage.setItem('cms_videos',JSON.stringify(arr));
  if(window.CloudNow&&CloudNow.ready) CloudNow.saveKey('cms_videos',arr);
  if(window.CloudLive&&CloudLive.connected) CloudLive.saveByLocalKey('cms_videos',arr);
  if(window.CloudRTDB&&CloudRTDB.connected) CloudRTDB.save('cms_videos',arr);
 }

 window.VideoForce={
  addPrompt(){
   const title=prompt('שם הסרטון:');
   if(!title)return;
   const url=prompt('קישור YouTube:');
   if(!url)return;
   if(!/^https?:\/\//i.test(url))return alert('צריך קישור שמתחיל ב-http או https');
   const arr=[...(DATA.videos||[])];
   arr.unshift([title,url]);
   saveVideos(arr);
   alert('הסרטון נוסף וסונכרן');
   render();
  },
  del(i){
   const arr=[...(DATA.videos||[])];
   if(!confirm('למחוק את הסרטון "'+(arr[i]?.[0]||'')+'"?'))return;
   arr.splice(i,1); saveVideos(arr); render();
  },
  edit(i){
   const arr=[...(DATA.videos||[])];
   const title=prompt('שם הסרטון:',arr[i]?.[0]||''); if(!title)return;
   const url=prompt('קישור:',arr[i]?.[1]||''); if(!url)return;
   arr[i]=[title,url]; saveVideos(arr); render();
  },
  open(url){ if(!url||!/^https?:\/\//i.test(url))return alert('קישור לא תקין'); window.open(url,'_blank','noopener,noreferrer'); }
 };

 function renderVideos(){
  if(!window.state||state.page!=='videos'||!window.app)return;
  const admin=isAdmin();
  const videos=DATA.videos||[];
  app.innerHTML=`<section class="page"><h2>סרטונים</h2>
    ${admin?`<div class="card"><button class="btn" id="v60AddVideoBtn">➕ הוסף סרטון</button></div>`:''}
    <div class="cards">${videos.map((v,i)=>`<div class="card"><h3>🎥 ${v[0]||'סרטון'}</h3><p><button class="btn alt" onclick="VideoForce.open('${String(v[1]||'').replace(/'/g,"\\'")}')">פתח סרטון</button></p>${admin?`<div class="v60Actions"><button class="btn alt" onclick="VideoForce.edit(${i})">✏️ ערוך</button><button class="btn red" onclick="VideoForce.del(${i})">🗑️ מחק</button></div>`:''}</div>`).join('')}</div>
  </section>`;
  const btn=document.getElementById('v60AddVideoBtn');
  if(btn)btn.onclick=VideoForce.addPrompt;
 }

 document.addEventListener('click',function(e){
  const b=e.target.closest('button');
  if(!b)return;
  if((b.textContent||'').includes('הוסף סרטון')){
   e.preventDefault(); e.stopPropagation(); VideoForce.addPrompt();
  }
 },true);

 function version(){
  document.querySelectorAll('#v59VersionBadge,#v58VersionBadge,#v57VersionBadge,#v56VersionBadge,#v55VersionBadge,#v54VersionBadge,#v53VersionBadge,#v52VersionBadge,#v51VersionBadge,.versionBadge,.finalBadge').forEach(x=>x.remove());
  const logo=document.querySelector('.logo');
  if(logo&&!document.getElementById('v60VersionBadge')){const b=document.createElement('span');b.id='v60VersionBadge';b.textContent=VERSION;logo.appendChild(b);}
  document.querySelectorAll('h1,h2,h3,p,span,div,button').forEach(el=>{if(el.childNodes.length===1&&el.textContent)el.textContent=el.textContent.replace(/V\s?\d+(?:\.\d+)?/g,VERSION);});
 }

 function fixImages(){
  const hero=document.querySelector('.homeHeroImage,.heroImage,.heroPhoto');
  if(hero){hero.style.backgroundImage=`linear-gradient(180deg,rgba(8,8,21,.03),rgba(8,8,21,.14)),url('${IMAGES["Narwal Flow 2"]}')`; hero.style.minHeight='330px';}
  // fallback: first large empty/white element on home
  if(window.state&&state.page==='home'){
    [...document.querySelectorAll('.page div')].forEach(el=>{
      const r=el.getBoundingClientRect();
      const txt=(el.textContent||'').trim();
      if(r.height>220 && r.width>250 && txt.length<10){
        el.classList.add('v60HeroImg');
        el.style.backgroundImage=`url('${IMAGES["Narwal Flow 2"]}')`;
      }
    });
  }
  document.querySelectorAll('.productPhoto,.modelHeroImg,.modelImageFixed,.gallery div').forEach(el=>{
   const txt=(el.closest('.card')?.textContent||el.closest('.page')?.textContent||'');
   Object.keys(IMAGES).forEach(m=>{if(txt.includes(m))el.style.backgroundImage=`url('${IMAGES[m]}')`;});
  });
 }

 function renderModels(){
  if(!window.state||state.page!=='models'||!window.DATA||!window.app)return;
  app.innerHTML=`<section class="page"><h2>קטלוג דגמים</h2><div class="cards">${(DATA.models||[]).map((m,i)=>`<div class="card"><div class="v60ModelImg" style="background-image:url('${IMAGES[m[0]]||IMAGES["Narwal Flow 2"]}')"></div><h3>${m[0]}</h3><p>${m[7]||''}</p><button class="btn" onclick="V76&&V76.openModel?V76.openModel(${i}):null">פרטים מלאים</button><button class="btn alt" onclick="App.show('compare')">השווה</button></div>`).join('')}</div></section>`;
 }

 const oldRender=window.render;
 window.render=function(){
  oldRender();
  setTimeout(()=>{document.body.classList.toggle('admin-mode',isAdmin());version();fixImages();renderModels();renderVideos();},80);
 };

 window.VideoAdmin=window.VideoAdmin||{};
 window.VideoAdmin.add=VideoForce.addPrompt;

 document.body.classList.toggle('admin-mode',isAdmin());
 setTimeout(()=>{version();fixImages();renderModels();renderVideos();},300);
})();

    const url=prompt('קישור YouTube:');
    if(!url)return;
    if(!/^https?:\/\//i.test(url))return alert('צריך קישור שמתחיל ב-http או https');
    const arr=[...(DATA.videos||[])];
    arr.unshift([title,url]);
    this.save(arr);
    alert('הסרטון נוסף וסונכרן');
    render();
  },
  edit(i){
    const arr=[...(DATA.videos||[])];
    const title=prompt('שם הסרטון:',arr[i]?.[0]||'');
    if(!title)return;
    const url=prompt('קישור:',arr[i]?.[1]||'');
    if(!url)return;
    arr[i]=[title,url];
    this.save(arr);
    render();
  },
  del(i){
    const arr=[...(DATA.videos||[])];
    if(!confirm('למחוק סרטון?'))return;
    arr.splice(i,1);
    this.save(arr);
    render();
  },
  open(url){
    if(!url||!/^https?:\/\//i.test(url))return alert('קישור לא תקין');
    window.open(url,'_blank','noopener,noreferrer');
  }
};
(function(){
  function finish(){
    document.querySelectorAll('#v75Badge,#v74VersionBadge,#v73VersionBadge,#v72VersionBadge,#v71VersionBadge,#v70VersionBadge,#v69VersionBadge,#v68VersionBadge,#v67VersionBadge,#v66VersionBadge,#v65VersionBadge,#v64VersionBadge,#v63VersionBadge,#v62VersionBadge,#v61VersionBadge,#v60VersionBadge,#v59VersionBadge,#v58VersionBadge,#v57VersionBadge,.versionBadge,.finalBadge,#globalVersionBadge,#finalVersionBadge').forEach(x=>x.remove());
    const logo=document.querySelector('.logo');
    if(logo&&!document.getElementById('v76Badge')){
      const b=document.createElement('span');
      b.id='v76Badge';
      b.textContent='V76';
      logo.appendChild(b);
    }
    const hero=document.querySelector('.robotArt,.homeHeroImage,.heroImage,.heroPhoto');
    if(hero){
      hero.style.backgroundImage=`url('${IMG_MAP['Narwal Flow 2']}')`;
      hero.style.backgroundSize='contain';
      hero.style.backgroundRepeat='no-repeat';
      hero.style.backgroundPosition='center';
      hero.style.backgroundColor='#fff';
    }
    document.querySelectorAll('.card').forEach(card=>{
      const txt=card.textContent||'';
      let im=null;
      if(txt.includes('Narwal Flow 2')) im=IMG_MAP['Narwal Flow 2'];
      else if(txt.includes('Narwal Flow')) im=IMG_MAP['Narwal Flow'];
      else if(txt.includes('Narwal Freo X Ultra')) im=IMG_MAP['Narwal Freo X Ultra'];
      else if(txt.includes('Narwal Freo Z Ultra')) im=IMG_MAP['Narwal Freo Z Ultra'];
      if(!im)return;
      const box=card.querySelector('.modelImg,.productPhoto,.modelHeroImg,.modelImageFixed,.gallery div');
      if(box)box.style.backgroundImage=`url('${im}')`;
    });
  }
  const old=window.render;
  window.render=function(){old();setTimeout(finish,20)};
  setTimeout(finish,50);
})();
</script>
