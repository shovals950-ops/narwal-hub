<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Narwal Hub 2.0 Clean</title>
<meta name="theme-color" content="#080814">
<style>
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#1d1237 0,#080814 40%,#070711 100%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh}
button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:rgba(8,8,20,.94);backdrop-filter:blur(12px);border-bottom:1px solid #252546}
.logo{font-weight:1000;letter-spacing:2px}.badge{font-size:12px;background:#14532d;color:#bbf7d0;border:1px solid #22c55e66;border-radius:999px;padding:4px 9px;margin-inline-start:6px}
.menuBtn,.backBtn{background:#17172f;color:#fff;border:1px solid #33335f;border-radius:14px;padding:10px 12px;font-weight:900}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:none}.backdrop.open{display:block}
.drawer{position:fixed;top:0;right:0;width:min(88vw,360px);height:100vh;z-index:90;background:#0f0f22;border-left:1px solid #33335f;transform:translateX(105%);transition:.22s ease;box-shadow:-20px 0 55px #0009;padding:16px;overflow:auto}
.drawer.open{transform:none}.drawerHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.drawerTitle{font-weight:1000;font-size:20px}
.navList{display:grid;gap:9px}.navItem{width:100%;text-align:right;background:#15152b;color:#fff;border:1px solid #2f2f55;border-radius:16px;padding:14px;font-weight:900;display:flex;justify-content:space-between;align-items:center}
.navItem.active{background:#241042;border-color:#a855f7;box-shadow:0 0 0 2px #a855f733 inset}
main{padding-bottom:82px}.page{max-width:1050px;margin:0 auto;padding:16px}
.hero{padding:18px 16px 24px;border-bottom:1px solid #261d42;background:linear-gradient(180deg,#0a0a18,#140823)}
.searchBox{max-width:820px;margin:0 auto 18px;display:flex;align-items:center;gap:10px;background:#fff;border-radius:22px;padding:11px 14px;box-shadow:0 14px 40px #0007;color:#111827}
.searchBox input{flex:1;border:0;outline:0;background:transparent;color:#111827;font-size:17px;padding:8px}.searchBox button{background:#111827;color:#fff;border-radius:16px;padding:10px 14px;font-weight:900}
.heroBox{text-align:center;max-width:900px;margin:0 auto}.heroImage{height:285px;border-radius:28px;background:linear-gradient(135deg,#fff,#efeaff 45%,#c4b5fd);border:1px solid #c084fc;box-shadow:0 18px 65px #0008;margin:14px 0 18px;position:relative;overflow:hidden}
.heroImage:after{content:"NARWAL FLOW 2";position:absolute;bottom:20px;left:0;right:0;color:#111827;font-weight:1000;letter-spacing:4px;font-size:24px}
.title{font-size:42px;font-weight:1000;letter-spacing:6px;margin:8px 0}.title span{color:#a855f7}.subtitle{color:#d7d0ee;font-size:17px;line-height:1.7;max-width:760px;margin:0 auto}
.quick{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}.btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-radius:16px;padding:11px 14px;font-weight:1000;border:1px solid #ffffff22}.btn.alt{background:#17172f;border:1px solid #33335f}.btn.red{background:#7f1d1d}
.section{max-width:1050px;margin:0 auto;padding:18px 16px}.section h2,.page h2{font-size:28px;margin:10px 0 14px}
.catGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.cat{min-height:150px;border-radius:22px;overflow:hidden;background:#f8fafc;color:#111827;border:1px solid #ffffff22;box-shadow:0 16px 35px #0005;display:flex;flex-direction:column;padding:0}
.catTop{height:58px;min-height:58px}.cat:nth-child(1) .catTop{background:linear-gradient(120deg,#ede9fe,#c4b5fd)}.cat:nth-child(2) .catTop{background:linear-gradient(120deg,#a7f3d0,#60a5fa)}.cat:nth-child(3) .catTop{background:linear-gradient(120deg,#fde68a,#fb7185)}.cat:nth-child(4) .catTop{background:linear-gradient(120deg,#ddd6fe,#f0abfc)}.cat:nth-child(5) .catTop{background:linear-gradient(120deg,#93c5fd,#8b5cf6)}.cat:nth-child(6) .catTop{background:linear-gradient(120deg,#e5e7eb,#c4b5fd)}
.catBody{flex:1;padding:13px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.catBody h3{margin:0 0 6px;color:#111827;font-size:20px}.catBody p{margin:0;color:#64748b;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{background:#111126;border:1px solid #2f2f55;border-radius:20px;padding:16px;color:#fff;box-shadow:0 12px 35px #0004}.card h3{margin:0 0 8px}.muted{color:#aaa6c8;line-height:1.55}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}.input,.select{width:100%;background:#0c0c1d;color:#fff;border:1px solid #33335f;border-radius:14px;padding:12px;outline:0;margin:6px 0}
.faqItem{background:#111126;border:1px solid #2f2f55;border-radius:18px;margin:10px 0;overflow:hidden}.faqQ{padding:14px;font-weight:1000;cursor:pointer}.faqA{display:none;padding:0 14px 14px;color:#d4d0ea;line-height:1.6}.faqItem.open .faqA{display:block}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.result{background:#101025;border:1px solid #29294b;border-radius:14px;padding:12px;margin:8px 0;color:#fff;text-align:right}
.compareBox{display:grid;grid-template-columns:1fr 1fr;gap:12px}table{width:100%;border-collapse:separate;border-spacing:0 8px}th,td{background:#101025;border:1px solid #29294b;padding:12px;text-align:right;vertical-align:top}th{color:#c4b5fd;white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{text-align:center;background:#101025;border:1px solid #29294b;border-radius:18px;padding:14px}.stat strong{display:block;font-size:30px}
.bottomNav{position:fixed;right:0;left:0;bottom:0;z-index:45;background:rgba(8,8,20,.94);backdrop-filter:blur(12px);border-top:1px solid #252546;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:7px 8px max(7px,env(safe-area-inset-bottom))}
.bottomNav button{background:transparent;color:#aaa6c8;border-radius:14px;padding:8px 4px;font-size:12px;font-weight:900}.bottomNav button.active{background:#241042;color:#fff}
@media(max-width:700px){.heroImage{height:245px}.title{font-size:34px}.grid{grid-template-columns:1fr}.compareBox{grid-template-columns:1fr}}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>
<body>
<header class="topbar"><button class="menuBtn" id="menuBtn">☰ תפריט</button><div class="logo">NARWAL HUB <span class="badge">2.0</span></div><button class="backBtn" id="homeBtn">בית</button></header>
<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer"><div class="drawerHead"><div class="drawerTitle">קטגוריות</div><button class="menuBtn" id="closeDrawer">✕</button></div><div class="navList" id="navList"></div></aside>
<main id="app"></main>
<nav class="bottomNav" id="bottomNav"></nav>
<script>
const firebaseConfig = window.firebaseConfig || null;
(function(){
const DEFAULT_DATA={
 faq:[{cat:"כללי",q:"איך מחפשים תקלה באתר?",a:"אפשר לחפש לפי מילים כמו טיפות, מים, מפה, רולר או קוד תקלה. החיפוש בודק גם בתוך ה־FAQ."},{cat:"ניקוי",q:"למה יש טיפות מים אחרי ניקוי?",a:"בדרך כלל זה קשור למינון חומר, לכלוך ברולר או שאריות סבון. כדאי להפחית מינון, לנקות רולר ולהריץ ניקוי נוסף."},{cat:"תחנה",q:"מה עושים כשיש מים בתחנה?",a:"בודקים שמיכל מים מלוכלכים יושב טוב, שאין לכלוך באטמים, ושאין חסימה במגש או בניקוז."},{cat:"מפות",q:"למה השואב לא מזהה מפה או קומה?",a:"צריך לוודא שהמפה הנכונה נבחרה, שהשואב מתחיל מנקודת התחלה מוכרת, ושאין שינוי גדול בבית."},{cat:"אפליקציה",q:"הרובוט לא מתחבר לאפליקציה. מה לבדוק?",a:"בדוק Wi‑Fi 2.4GHz, קרבה לראוטר, הרשאות באפליקציה והאם השרתים זמינים."}],
 errors:[{code:"3000",title:"בעיית ניקוז מים",fix:"בדוק מיכל מים מלוכלכים, אטמים, מגש תחנה וצינור ניקוז. נקה לכלוך והפעל שוב."},{code:"1183",title:"השואב נעצר באמצע פעולה",fix:"בדוק אם יש חסימה בגלגלים, רולר, מברשת צד או אזור צר שהשואב נתקע בו."}],
 videos:[{title:"מדריך תחזוקה בסיסי",url:"https://www.youtube.com/"},{title:"טיפים לשטיפה טובה יותר",url:"https://www.youtube.com/"}],
 models:[{name:"Narwal Flow 2",suction:"31,000Pa",wash:"FlowWash Roller",ai:"NarMind Pro",note:"דגם פרימיום מתקדם"},{name:"Narwal Flow",suction:"22,000Pa",wash:"FlowWash Roller",ai:"Smart Mapping",note:"שואב שוטף חכם"},{name:"Narwal Freo Z Ultra",suction:"12,000Pa",wash:"Dual Mop",ai:"Dual AI",note:"AI מתקדם"},{name:"Narwal Freo X Ultra",suction:"8,200Pa",wash:"Mop Pads",ai:"DirtSense",note:"חזק ויציב"}]
};
const routes=[["home","בית","🏠"],["models","דגמים","🤖"],["compare","השוואה","⚖️"],["errors","תקלות","🔧"],["faq","FAQ","❓"],["videos","סרטונים","🎥"],["device","תיק מכשיר","🧾"],["admin","ניהול","👑"]];
const state={page:"home",isAdmin:localStorage.getItem("nh2_admin")==="1",data:loadLocal(),online:0,visitsToday:0,totalVisits:0};
let db=null,firebaseReady=false;
function clone(x){return JSON.parse(JSON.stringify(x))}
function loadLocal(){try{const s=JSON.parse(localStorage.getItem("nh2_data")||"null");if(s)return Object.assign(clone(DEFAULT_DATA),s)}catch(e){}return clone(DEFAULT_DATA)}
function saveLocal(){localStorage.setItem("nh2_data",JSON.stringify(state.data))}
function saveCloud(){saveLocal();if(firebaseReady&&db)db.ref("narwalHub2/content").set(state.data).catch(()=>{})}
function initFirebase(){try{if(window.firebase&&firebaseConfig&&!firebase.apps.length)firebase.initializeApp(firebaseConfig);if(window.firebase&&firebase.database){db=firebase.database();firebaseReady=true;db.ref("narwalHub2/content").on("value",s=>{const v=s.val();if(v){state.data=Object.assign(clone(DEFAULT_DATA),v);saveLocal();render()}});trackVisit();trackOnline();}}catch(e){firebaseReady=false;console.log("Firebase not connected",e)}}
function todayKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function trackVisit(){if(!db)return;const k="nh2_visit_"+todayKey();if(localStorage.getItem(k)!=="1"){localStorage.setItem(k,"1");db.ref("narwalHub2/analytics/visits/total").transaction(v=>(v||0)+1);db.ref("narwalHub2/analytics/visits/days/"+todayKey()).transaction(v=>(v||0)+1)}db.ref("narwalHub2/analytics/visits/total").on("value",s=>{state.totalVisits=s.val()||0;if(state.page==="admin")render()});db.ref("narwalHub2/analytics/visits/days/"+todayKey()).on("value",s=>{state.visitsToday=s.val()||0;if(state.page==="admin")render()})}
function trackOnline(){if(!db)return;const id="s_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);const ref=db.ref("narwalHub2/online/"+id);function payload(){return{ts:firebase.database.ServerValue.TIMESTAMP,localTs:Date.now(),page:state.page,device:/iPhone|iPad/.test(navigator.userAgent)?"iPhone":/Android/.test(navigator.userAgent)?"Android":"Desktop"}}ref.set(payload());ref.onDisconnect().remove();setInterval(()=>ref.update(payload()),15000);db.ref("narwalHub2/online").on("value",snap=>{const val=snap.val()||{},now=Date.now();state.online=Object.values(val).filter(x=>now-(x.localTs||0)<70000).length;if(state.page==="admin")render()})}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function go(p){state.page=p;closeDrawer();render();scrollTo(0,0)}
function openDrawer(){drawer.classList.add("open");backdrop.classList.add("open")}function closeDrawer(){drawer.classList.remove("open");backdrop.classList.remove("open")}
function navHtml(){return routes.map(([id,l,i])=>`<button class="navItem ${state.page===id?"active":""}" data-route="${id}"><span>${i} ${l}</span><span>›</span></button>`).join("")}
function bottomHtml(){return [["home","בית","🏠"],["compare","השוואה","⚖️"],["faq","FAQ","❓"],["videos","סרטונים","🎥"],["admin","ניהול","👑"]].map(([id,l,i])=>`<button class="${state.page===id?"active":""}" data-route="${id}">${i}<br>${l}</button>`).join("")}
function cat(r,t,d){return`<button class="cat" data-route="${r}"><div class="catTop"></div><div class="catBody"><h3>${t}</h3><p>${d}</p></div></button>`}
function home(){return`<section class="hero"><div class="searchBox"><span>🔎</span><input id="globalSearch" placeholder="חפש תקלה, FAQ, סרטון או דגם..." oninput="Narwal.search(this.value)"><button onclick="Narwal.search(document.getElementById('globalSearch').value)">חפש</button></div><div id="searchResults" style="max-width:820px;margin:0 auto"></div><div class="heroBox"><div class="heroImage"></div><div class="title">NARWAL <span>HUB</span></div><p class="subtitle">מרכז הידע הישראלי למוצרי Narwal — דגמים, תקלות, FAQ, סרטונים, השוואות וניהול מסודר.</p><div class="quick"><button class="btn" data-route="compare">השוואה ⚖️</button><button class="btn" data-route="videos">סרטונים 🎥</button><button class="btn" data-route="faq">FAQ ❓</button><button class="btn" data-route="admin">ניהול 👑</button></div></div></section><section class="section"><h2>קטגוריות</h2><div class="catGrid">${cat("models","דגמים 🤖","כל דגמי Narwal")}${cat("compare","השוואה ⚖️","השווה בין דגמים")}${cat("errors","תקלות 🔧","פתרון לפי קוד")}${cat("faq","FAQ ❓","שאלות נפוצות")}${cat("videos","סרטונים 🎥","מדריכים ועדכונים")}${cat("device","תיק מכשיר 🧾","שמירה אישית")}</div></section>`}
function adminAdd(type,label){return state.isAdmin?`<div class="toolbar"><button class="btn" onclick="Narwal.add('${type}')">➕ ${label}</button></div>`:""}
function adminActions(type,i){return state.isAdmin?`<div class="actions"><button class="btn alt" onclick="Narwal.edit('${type}',${i})">✏️ ערוך</button><button class="btn red" onclick="Narwal.del('${type}',${i})">🗑️ מחק</button></div>`:""}
function models(){return`<section class="page"><h2>דגמים</h2>${adminAdd("model","הוסף דגם")}<div class="grid">${state.data.models.map((m,i)=>`<div class="card"><h3>${esc(m.name)}</h3><p class="muted">${esc(m.note)}</p><table><tr><th>שאיבה</th><td>${esc(m.suction)}</td></tr><tr><th>שטיפה</th><td>${esc(m.wash)}</td></tr><tr><th>AI</th><td>${esc(m.ai)}</td></tr></table>${adminActions("model",i)}</div>`).join("")}</div></section>`}
function compare(){const opts=state.data.models.map((m,i)=>`<option value="${i}">${esc(m.name)}</option>`).join("");return`<section class="page"><h2>השוואת דגמים</h2><div class="card"><div class="compareBox"><select class="select" id="cmpA">${opts}</select><select class="select" id="cmpB">${opts}</select></div><button class="btn" onclick="Narwal.runCompare()">השווה</button><div id="compareOut"></div></div></section>`}
function errors(){return`<section class="page"><h2>תקלות וקודי שגיאה</h2>${adminAdd("error","הוסף תקלה")}<div class="grid">${state.data.errors.map((e,i)=>`<div class="card"><h3>${esc(e.code)} · ${esc(e.title)}</h3><p class="muted">${esc(e.fix)}</p>${adminActions("error",i)}</div>`).join("")}</div></section>`}
function faq(){return`<section class="page"><h2>FAQ</h2>${adminAdd("faq","הוסף FAQ")}<div class="searchBox" style="box-shadow:none;margin:0 0 12px"><span>🔎</span><input id="faqSearch" placeholder="חיפוש FAQ..." oninput="Narwal.searchFAQ(this.value)"></div><div id="faqResults"></div>${state.data.faq.map((f,i)=>`<div class="faqItem"><div class="faqQ" onclick="this.parentElement.classList.toggle('open')">${esc(f.q)}</div><div class="faqA">${esc(f.a)}${adminActions("faq",i)}</div></div>`).join("")}</section>`}
function videos(){return`<section class="page"><h2>סרטונים</h2>${adminAdd("video","הוסף סרטון")}<div class="grid">${state.data.videos.map((v,i)=>`<div class="card"><h3>🎥 ${esc(v.title)}</h3><p class="muted" style="word-break:break-all">${esc(v.url)}</p><div class="actions"><button class="btn alt" onclick="window.open('${esc(v.url)}','_blank')">פתח</button>${adminActions("video",i)}</div></div>`).join("")}</div></section>`}
function device(){return`<section class="page"><h2>תיק מכשיר</h2><div class="card"><h3>🧾 בקרוב</h3><p class="muted">כאן יהיה אפשר לשמור דגם, תאריך רכישה, אחריות ותקלות אישיות.</p></div></section>`}
function admin(){if(!state.isAdmin)return`<section class="page"><h2>כניסת מנהל</h2><div class="card"><input class="input" id="adminPass" placeholder="סיסמת מנהל" type="password"><button class="btn" onclick="Narwal.login()">כניסה</button><p class="muted">ברירת מחדל: 1234</p></div></section>`;return`<section class="page"><h2>ניהול</h2><div class="stats"><div class="stat"><span>מחוברים עכשיו</span><strong>${state.online}</strong></div><div class="stat"><span>כניסות היום</span><strong>${state.visitsToday}</strong></div><div class="stat"><span>סה״כ כניסות</span><strong>${state.totalVisits}</strong></div><div class="stat"><span>Firebase</span><strong>${firebaseReady?"מחובר":"לא"}</strong></div></div><div class="grid" style="margin-top:12px"><div class="card"><h3>FAQ</h3><p class="muted">${state.data.faq.length} שאלות</p><button class="btn" data-route="faq">ניהול FAQ</button></div><div class="card"><h3>תקלות</h3><p class="muted">${state.data.errors.length} תקלות</p><button class="btn" data-route="errors">ניהול תקלות</button></div><div class="card"><h3>סרטונים</h3><p class="muted">${state.data.videos.length} סרטונים</p><button class="btn" data-route="videos">ניהול סרטונים</button></div><div class="card"><h3>פעולות</h3><button class="btn alt" onclick="Narwal.exportData()">ייצוא JSON</button> <button class="btn red" onclick="Narwal.logout()">יציאה</button></div></div></section>`}
function render(){navList.innerHTML=navHtml();bottomNav.innerHTML=bottomHtml();app.innerHTML=({home,models,compare,errors,faq,videos,device,admin}[state.page]||home)();if(state.page==="compare")setTimeout(runCompare,50);bindRoutes()}
function bindRoutes(){document.querySelectorAll("[data-route]").forEach(el=>{el.onclick=e=>{e.preventDefault();e.stopPropagation();go(el.dataset.route)}})}
function login(){if((document.getElementById("adminPass")?.value)==="1234"){state.isAdmin=true;localStorage.setItem("nh2_admin","1");go("admin")}else alert("סיסמה לא נכונה")}
function logout(){state.isAdmin=false;localStorage.removeItem("nh2_admin");go("home")}
function add(type){if(type==="faq"){const cat=prompt("קטגוריה:","כללי");if(!cat)return;const q=prompt("שאלה:");if(!q)return;const a=prompt("תשובה:");if(!a)return;state.data.faq.unshift({cat,q,a});saveCloud();go("faq")}if(type==="error"){const code=prompt("קוד תקלה:");if(!code)return;const title=prompt("כותרת:");if(!title)return;const fix=prompt("פתרון:");if(!fix)return;state.data.errors.unshift({code,title,fix});saveCloud();go("errors")}if(type==="video"){const title=prompt("שם הסרטון:");if(!title)return;const url=prompt("קישור YouTube:");if(!url)return;state.data.videos.unshift({title,url});saveCloud();go("videos")}if(type==="model"){const name=prompt("שם דגם:");if(!name)return;const suction=prompt("שאיבה:","");const wash=prompt("שטיפה:","");const ai=prompt("AI:","");const note=prompt("הערה:","");state.data.models.unshift({name,suction,wash,ai,note});saveCloud();go("models")}}
function edit(type,i){const map={faq:"faq",error:"errors",video:"videos",model:"models"};if(type==="faq"){const item=state.data.faq[i];if(!item)return;const cat=prompt("קטגוריה:",item.cat);if(!cat)return;const q=prompt("שאלה:",item.q);if(!q)return;const a=prompt("תשובה:",item.a);if(!a)return;state.data.faq[i]={cat,q,a}}if(type==="error"){const item=state.data.errors[i];if(!item)return;const code=prompt("קוד תקלה:",item.code);if(!code)return;const title=prompt("כותרת:",item.title);if(!title)return;const fix=prompt("פתרון:",item.fix);if(!fix)return;state.data.errors[i]={code,title,fix}}if(type==="video"){const item=state.data.videos[i];if(!item)return;const title=prompt("שם הסרטון:",item.title);if(!title)return;const url=prompt("קישור:",item.url);if(!url)return;state.data.videos[i]={title,url}}if(type==="model"){const item=state.data.models[i];if(!item)return;const name=prompt("שם דגם:",item.name);if(!name)return;const suction=prompt("שאיבה:",item.suction);const wash=prompt("שטיפה:",item.wash);const ai=prompt("AI:",item.ai);const note=prompt("הערה:",item.note);state.data.models[i]={name,suction,wash,ai,note}}saveCloud();go(map[type])}
function del(type,i){if(!confirm("למחוק?"))return;const map={faq:["faq","faq"],error:["errors","errors"],video:["videos","videos"],model:["models","models"]};const [arr,page]=map[type];state.data[arr].splice(i,1);saveCloud();go(page)}
function runCompare(){const a=+document.getElementById("cmpA")?.value||0,b=+document.getElementById("cmpB")?.value||1,A=state.data.models[a],B=state.data.models[b],out=document.getElementById("compareOut");if(!out||!A||!B)return;out.innerHTML=`<table><tr><th>דגם</th><td>${esc(A.name)}</td><td>${esc(B.name)}</td></tr><tr><th>שאיבה</th><td>${esc(A.suction)}</td><td>${esc(B.suction)}</td></tr><tr><th>שטיפה</th><td>${esc(A.wash)}</td><td>${esc(B.wash)}</td></tr><tr><th>AI</th><td>${esc(A.ai)}</td><td>${esc(B.ai)}</td></tr><tr><th>הערה</th><td>${esc(A.note)}</td><td>${esc(B.note)}</td></tr></table>`}
function searchFAQ(q){q=(q||"").toLowerCase().trim();const box=document.getElementById("faqResults");if(!box)return;if(!q){box.innerHTML="";return}const res=state.data.faq.filter(f=>(f.cat+" "+f.q+" "+f.a).toLowerCase().includes(q));box.innerHTML=res.length?res.map(f=>`<div class="result"><b>${esc(f.q)}</b><br><span class="muted">${esc(f.a)}</span></div>`).join(""):`<div class="result">לא נמצאו תוצאות</div>`}
function search(q){q=(q||"").toLowerCase().trim();const box=document.getElementById("searchResults");if(!box)return;if(!q){box.innerHTML="";return}const out=[];state.data.faq.forEach(f=>{if((f.cat+" "+f.q+" "+f.a).toLowerCase().includes(q))out.push(["FAQ",f.q,f.a,"faq"])});state.data.errors.forEach(e=>{if((e.code+" "+e.title+" "+e.fix).toLowerCase().includes(q))out.push(["תקלה",e.code+" · "+e.title,e.fix,"errors"])});state.data.models.forEach(m=>{if(JSON.stringify(m).toLowerCase().includes(q))out.push(["דגם",m.name,m.note,"models"])});state.data.videos.forEach(v=>{if(JSON.stringify(v).toLowerCase().includes(q))out.push(["סרטון",v.title,v.url,"videos"])});box.innerHTML=out.length?out.slice(0,10).map(r=>`<div class="result" data-route="${r[3]}"><b>${esc(r[0])} · ${esc(r[1])}</b><br><span class="muted">${esc(r[2])}</span></div>`).join(""):`<div class="result">לא נמצאו תוצאות</div>`;bindRoutes()}
function exportData(){const blob=new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="narwal-hub-data.json";a.click()}
window.Narwal={go,login,logout,add,edit,del,runCompare,searchFAQ,search,exportData};
menuBtn.onclick=openDrawer;closeDrawer.onclick=closeDrawer;backdrop.onclick=closeDrawer;homeBtn.onclick=()=>go("home");
initFirebase();render();
})();
</script>
</body></html>
