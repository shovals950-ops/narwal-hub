<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Narwal Hub Clean V1</title>
<style>
:root{--bg:#060513;--card:#111126;--line:#31285b;--p:#8b3dff;--p2:#b653ff;--txt:#fff;--muted:#aaa6c8}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#1d0b3b,#060513 42%,#03020a);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding-bottom:92px}
button,input,textarea{font:inherit}.head{position:sticky;top:0;z-index:10;background:#090817ee;backdrop-filter:blur(12px);border-bottom:1px solid #2b2249;display:flex;align-items:center;justify-content:space-between;padding:14px 12px;gap:8px}.logo{font-weight:1000;letter-spacing:5px;font-size:22px;white-space:nowrap}.logo b{color:var(--p2)}.badge{background:#14532d;color:#bbf7d0;border:1px solid #22c55e66;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900}.top{border:1px solid #6d36b8;background:#151329;color:white;border-radius:16px;padding:10px 14px;font-weight:900}.page{padding:18px 14px;max-width:820px;margin:auto}.hero{height:250px;background:white;border:1px solid #b653ff66;border-radius:28px;display:flex;align-items:center;justify-content:center;overflow:hidden}.hero img{max-width:84%;max-height:84%;object-fit:contain}h1{font-size:48px;text-align:center;letter-spacing:7px;margin:25px 0 10px}h1 b{color:var(--p2)}h2{font-size:34px;margin:12px 0 18px}.lead{text-align:center;color:#d6d0ec;font-size:20px;line-height:1.6}.quick{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:18px 0}.btn{border:0;border-radius:16px;background:linear-gradient(135deg,var(--p),var(--p2));color:white;font-weight:1000;padding:12px 18px}.btn.alt{background:#252342}.btn.red{background:#7f1d1d}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.cat{height:150px;background:#f8fafc;color:#111827;border-radius:24px;overflow:hidden;box-shadow:0 15px 35px #0007}.catTop{height:58px}.catBody{height:92px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}.cat h3{margin:0 0 6px;font-size:21px}.cat p{margin:0;color:#64748b;font-weight:900}.card,.item,.result{background:#111126;border:1px solid var(--line);border-radius:20px;padding:15px;margin:12px 0}.itemTitle{font-size:20px;font-weight:1000;margin-bottom:8px}.itemText{color:#c9c3e6;line-height:1.55;white-space:pre-wrap}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.search{background:white;color:#111827;border-radius:22px;padding:8px;display:flex;gap:8px;margin:14px 0}.search input{border:0;outline:0;flex:1;background:transparent;padding:12px;font-size:17px}.search button{border:0;background:#111827;color:white;border-radius:14px;padding:10px 16px;font-weight:900}.bottom{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#080717f5;border-top:1px solid #2b2249;display:grid;grid-template-columns:repeat(5,1fr);padding:8px 4px}.bottom button{background:none;border:0;color:#aaa6c8;font-weight:900}.bottom button.active{color:white}.ico{display:block;font-size:24px}.overlay{position:fixed;inset:0;background:#0009;z-index:50;display:none}.overlay.open{display:block}.drawer{position:fixed;top:0;right:0;width:min(80vw,370px);height:100dvh;background:#09091d;z-index:60;transform:translateX(110%);transition:.2s;padding:24px 16px;overflow:auto;border-left:1px solid var(--line)}.drawer.open{transform:translateX(0)}.close{width:50px;height:50px;border-radius:50%;border:0;background:#7f1d1d;color:white;font-size:28px;font-weight:900}.menuBtn{width:100%;background:#111126;border:1px solid var(--line);color:white;border-radius:18px;padding:16px;margin:8px 0;font-size:20px;font-weight:1000;text-align:right}.menuBtn.active{background:#291044;border-color:#a855f7}.adminOnly{display:none}body.admin .adminOnly{display:block}.input,textarea{width:100%;border:1px solid var(--line);background:#09091d;color:white;border-radius:16px;padding:13px;margin:7px 0;outline:0}textarea{min-height:90px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{text-align:center}.stat strong{display:block;font-size:34px}@media(max-width:430px){h1{font-size:42px}.hero{height:220px}}
</style>
</head>
<body>
<header class="head"><button class="top" onclick="back()">חזרה →</button><div style="display:flex;align-items:center;gap:10px"><span class="badge">CLEAN V1</span><div class="logo">NARWAL <b>HUB</b></div></div><button class="top" onclick="openMenu()">תפריט ≡</button></header>
<div class="overlay" id="ov" onclick="closeMenu()"></div>
<aside class="drawer" id="dr"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><button class="close" onclick="closeMenu()">×</button><div class="logo">NARWAL <b>HUB</b></div></div>
<button class="menuBtn" data-page="home" onclick="show('home')">בית 🏠</button><button class="menuBtn" data-page="models" onclick="show('models')">דגמים 🤖</button><button class="menuBtn" data-page="compare" onclick="show('compare')">השוואת דגמים ⚖️</button><button class="menuBtn" data-page="errors" onclick="show('errors')">פתרון תקלות 🔧</button><button class="menuBtn" data-page="faq" onclick="show('faq')">FAQ ❓</button><button class="menuBtn" data-page="videos" onclick="show('videos')">סרטונים 🎥</button><button class="menuBtn" data-page="device" onclick="show('device')">תיק המכשיר 🧾</button><button class="menuBtn adminOnly" data-page="admin" onclick="show('admin')">ניהול 👑</button></aside>
<main id="app"></main>
<nav class="bottom"><button data-page="device" onclick="show('device')"><span class="ico">🧾</span>תיק</button><button data-page="videos" onclick="show('videos')"><span class="ico">🎥</span>סרטונים</button><button data-page="errors" onclick="show('errors')"><span class="ico">⚠️</span>תקלות</button><button data-page="faq" onclick="show('faq')"><span class="ico">❓</span>FAQ</button><button data-page="home" onclick="show('home')"><span class="ico">🏠</span>בית</button></nav>
<script>
const KEY='narwal_clean_v1';
const def={admin:false,img:'https://raw.githubusercontent.com/shovals950-ops/narwal-hub/main/narwal.png',
models:[{name:'Narwal Flow',suction:'22,000Pa',wash:'FlowWash Roller',ai:'Smart Mapping'},{name:'Narwal Flow 2',suction:'31,000Pa',wash:'FlowWash Roller',ai:'NarMind Pro / AI'}],
faq:[{q:'למה יש טיפות מים אחרי ניקוי?',a:'בדרך כלל זה קשור למינון חומר, לכלוך ברולר או שאריות סבון. כדאי להפחית מינון ולנקות רולר.'},{q:'איך מחפשים תקלה באתר?',a:'אפשר לחפש לפי מילים כמו טיפות, מים, מפה, רולר או קוד תקלה.'}],
errors:[{code:'3000',title:'בעיית ניקוז מים',fix:'בדוק מיכל מים מלוכלכים, מגש ניקוז, חסימה בצינור או לכלוך באזור התחנה.'},{code:'1183',title:'הרובוט נעצר',fix:'בדוק שהמברשות נקיות, שאין חפץ תקוע ושאין בעיית מפה או מיקום.'}],
videos:[{title:'סרטון לדוגמה',url:'',note:'אפשר להוסיף קישור YouTube או הערה.'}],device:{name:'Narwal Flow',serial:'',owner:'',notes:''}};
let data=load(), page='home', hist=['home'];
function load(){try{return {...structuredClone(def),...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch(e){return structuredClone(def)}}function save(){localStorage.setItem(KEY,JSON.stringify(data))}function e(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function openMenu(){dr.classList.add('open');ov.classList.add('open')}function closeMenu(){dr.classList.remove('open');ov.classList.remove('open')}function setActive(){document.body.classList.toggle('admin',!!data.admin);document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===page))}
function show(p,push=true){page=p;if(push&&hist[hist.length-1]!==p)hist.push(p);closeMenu();render();window.scrollTo({top:0,behavior:'smooth'})}function back(){hist.length>1?(hist.pop(),show(hist[hist.length-1],false)):show('home',false)}
function adminLogin(){if(!data.admin){let p=prompt('סיסמת מנהל:');if(p!=='0000'&&p!=='shoval')return alert('סיסמה לא נכונה');data.admin=true;save()}show('admin')}
function home(){return `<section class="page"><div class="search"><button onclick="searchAll()">חפש</button><input id="s" oninput="searchAll()" placeholder="חפש תקלה, דגם, סרטון או מדריך... 🔎"></div><div id="res"></div><div class="hero"><img src="${e(data.img)}" onerror="this.style.display='none'"></div><h1>NARWAL <b>HUB</b></h1><p class="lead">מרכז הידע הישראלי למוצרי Narwal — דגמים, תקלות, מדריכים, סרטונים, השוואות ותיק מכשיר אישי.</p><div class="quick"><button class="btn" onclick="show('models')">דגמים 🤖</button><button class="btn alt" onclick="show('compare')">השוואה ⚖️</button><button class="btn alt" onclick="show('errors')">פתרון תקלות 🔧</button><button class="btn alt" onclick="show('device')">תיק מכשיר 🧾</button><button class="btn alt" onclick="adminLogin()">ניהול 👑</button></div><div class="grid">${cat('תקלות','פתרון לפי קוד','errors',0)}${cat('דגמים','כל דגמי Narwal','models',1)}${cat('FAQ','שאלות נפוצות','faq',2)}${cat('סרטונים','מדריכים ועדכונים','videos',3)}${cat('תיק מכשיר','שמירה אישית','device',4)}${cat('השוואות','השוואה בין דגמים','compare',5)}</div></section>`}
function cat(t,s,p,i){let g=['#fde68a,#fb7185','#93c5fd,#8b5cf6','#ddd6fe,#f0abfc','#8ec5fc,#8b5cf6','#e5e7eb,#c4b5fd','#a7f3d0,#60a5fa'][i];return `<div class="cat" onclick="show('${p}')"><div class="catTop" style="background:linear-gradient(120deg,${g})"></div><div class="catBody"><h3>${t}</h3><p>${s}</p></div></div>`}
function searchAll(){let q=s.value.toLowerCase().trim();if(!q){res.innerHTML='';return}let out=[];data.faq.forEach(x=>{if((x.q+' '+x.a).toLowerCase().includes(q))out.push(['FAQ',x.q,x.a,'faq'])});data.errors.forEach(x=>{if((x.code+' '+x.title+' '+x.fix).toLowerCase().includes(q))out.push(['תקלה',x.code+' · '+x.title,x.fix,'errors'])});data.models.forEach(x=>{if(JSON.stringify(x).toLowerCase().includes(q))out.push(['דגם',x.name,x.suction,'models'])});data.videos.forEach(x=>{if((x.title+' '+x.note+' '+x.url).toLowerCase().includes(q))out.push(['סרטון',x.title,x.note,'videos'])});res.innerHTML=out.length?out.map(r=>`<div class="result" onclick="show('${r[3]}')"><b>${e(r[0])} · ${e(r[1])}</b><div class="itemText">${e(r[2])}</div></div>`).join(''):'<div class="result">לא נמצאו תוצאות</div>'}
function models(){return `<section class="page"><h2>דגמים 🤖</h2>${addBtn('model','הוסף דגם')}<div class="grid">${data.models.map((m,i)=>`<div class="card"><h3>${e(m.name)}</h3><div class="itemText">שאיבה: ${e(m.suction)}<br>שטיפה: ${e(m.wash)}<br>AI: ${e(m.ai)}</div>${acts('model',i)}</div>`).join('')}</div></section>`}
function compare(){return `<section class="page"><h2>השוואת דגמים ⚖️</h2><div class="card">${data.models.map(m=>`<div class="item"><b>${e(m.name)}</b><div class="itemText">שאיבה: ${e(m.suction)}<br>שטיפה: ${e(m.wash)}<br>AI: ${e(m.ai)}</div></div>`).join('')}</div></section>`}
function faq(){return `<section class="page"><h2>FAQ ❓</h2>${addBtn('faq','הוסף FAQ')}<div class="search"><button onclick="faqSearch()">חפש</button><input id="fs" oninput="faqSearch()" placeholder="חפש בתוך FAQ..."></div><div id="fr"></div>${data.faq.map((x,i)=>`<div class="item"><div class="itemTitle">${e(x.q)}</div><div class="itemText">${e(x.a)}</div>${acts('faq',i)}</div>`).join('')}</section>`}
function faqSearch(){let q=fs.value.toLowerCase().trim();if(!q){fr.innerHTML='';return}let r=data.faq.filter(x=>(x.q+' '+x.a).toLowerCase().includes(q));fr.innerHTML=r.length?r.map(x=>`<div class="result"><b>${e(x.q)}</b><div class="itemText">${e(x.a)}</div></div>`).join(''):'<div class="result">לא נמצאו תוצאות</div>'}
function errors(){return `<section class="page"><h2>פתרון תקלות 🔧</h2>${addBtn('error','הוסף תקלה')}${data.errors.map((x,i)=>`<div class="item"><div class="itemTitle">קוד ${e(x.code)} · ${e(x.title)}</div><div class="itemText">${e(x.fix)}</div>${acts('error',i)}</div>`).join('')}</section>`}
function videos(){return `<section class="page"><h2>סרטונים 🎥</h2>${addBtn('video','הוסף סרטון')}${data.videos.map((x,i)=>`<div class="item"><div class="itemTitle">${e(x.title)}</div><div class="itemText">${e(x.note)}${x.url?`<br><br><a style="color:#c084fc" href="${e(x.url)}" target="_blank">פתח סרטון</a>`:''}</div>${acts('video',i)}</div>`).join('')}</section>`}
function device(){let d=data.device;return `<section class="page"><h2>תיק המכשיר 🧾</h2><div class="card"><input class="input" id="dn" placeholder="דגם" value="${e(d.name)}"><input class="input" id="ds" placeholder="מספר סידורי" value="${e(d.serial)}"><input class="input" id="do1" placeholder="בעלים" value="${e(d.owner)}"><textarea id="dt" placeholder="הערות">${e(d.notes)}</textarea><button class="btn" onclick="saveDevice()">שמור</button></div></section>`}
function adminPage(){return `<section class="page"><h2>ניהול 👑</h2><div class="card">ניהול פעיל ✅</div><div class="stats"><div class="card stat"><strong>${data.models.length}</strong>דגמים</div><div class="card stat"><strong>${data.faq.length}</strong>FAQ</div><div class="card stat"><strong>${data.errors.length}</strong>תקלות</div><div class="card stat"><strong>${data.videos.length}</strong>סרטונים</div></div><div class="quick"><button class="btn" onclick="show('faq')">ניהול FAQ</button><button class="btn" onclick="show('videos')">ניהול סרטונים</button><button class="btn" onclick="show('errors')">ניהול תקלות</button><button class="btn red" onclick="data.admin=false;save();show('home')">יציאה</button></div></section>`}
function addBtn(t,l){return data.admin?`<div class="card"><button class="btn" onclick="addItem('${t}')">➕ ${l}</button></div>`:''}function acts(t,i){return data.admin?`<div class="actions"><button class="btn alt" onclick="editItem('${t}',${i})">ערוך</button><button class="btn red" onclick="delItem('${t}',${i})">מחק</button></div>`:''}
function addItem(t){if(!data.admin)return adminLogin();if(t==='faq'){let q=prompt('שאלה');if(!q)return;let a=prompt('תשובה');if(!a)return;data.faq.unshift({q,a});save();show('faq',false)}if(t==='error'){let code=prompt('קוד');if(!code)return;let title=prompt('כותרת');if(!title)return;let fix=prompt('פתרון');if(!fix)return;data.errors.unshift({code,title,fix});save();show('errors',false)}if(t==='video'){let title=prompt('שם הסרטון');if(!title)return;let url=prompt('קישור','');let note=prompt('הערה','');data.videos.unshift({title,url,note});save();show('videos',false)}if(t==='model'){let name=prompt('שם דגם');if(!name)return;let suction=prompt('שאיבה','');let wash=prompt('שטיפה','');let ai=prompt('AI','');data.models.unshift({name,suction,wash,ai});save();show('models',false)}}
function editItem(t,i){if(!data.admin)return adminLogin();if(t==='faq'){let x=data.faq[i],q=prompt('שאלה',x.q);if(!q)return;let a=prompt('תשובה',x.a);if(!a)return;data.faq[i]={q,a};save();show('faq',false)}if(t==='error'){let x=data.errors[i],code=prompt('קוד',x.code);if(!code)return;let title=prompt('כותרת',x.title);if(!title)return;let fix=prompt('פתרון',x.fix);if(!fix)return;data.errors[i]={code,title,fix};save();show('errors',false)}if(t==='video'){let x=data.videos[i],title=prompt('שם',x.title);if(!title)return;let url=prompt('קישור',x.url);let note=prompt('הערה',x.note);data.videos[i]={title,url,note};save();show('videos',false)}if(t==='model'){let x=data.models[i],name=prompt('שם',x.name);if(!name)return;let suction=prompt('שאיבה',x.suction);let wash=prompt('שטיפה',x.wash);let ai=prompt('AI',x.ai);data.models[i]={name,suction,wash,ai};save();show('models',false)}}
function delItem(t,i){if(!data.admin)return adminLogin();if(!confirm('למחוק?'))return;if(t==='faq'){data.faq.splice(i,1);save();show('faq',false)}if(t==='error'){data.errors.splice(i,1);save();show('errors',false)}if(t==='video'){data.videos.splice(i,1);save();show('videos',false)}if(t==='model'){data.models.splice(i,1);save();show('models',false)}}
function saveDevice(){data.device={name:dn.value,serial:ds.value,owner:do1.value,notes:dt.value};save();alert('נשמר');show('device',false)}
function render(){setActive();app.innerHTML=({home,models,compare,faq,errors,videos,device,admin:adminPage}[page]||home)();setActive()}
show('home',false);
</script>
</body></html>
