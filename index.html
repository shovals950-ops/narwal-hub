<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Narwal Hub 3.2 Cloud</title>
<meta name="theme-color" content="#080814">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
:root{--bg:#080814;--panel:#111126;--panel2:#17172f;--text:#fff;--muted:#aaa6c8;--line:#2f2f55;--purple:#8b5cf6;--purple2:#a855f7;--green:#22c55e;--red:#ef4444}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#1d1237 0,#080814 40%,#070711 100%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh;overscroll-behavior-x:none}
button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}a{color:inherit}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:rgba(8,8,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid #252546}
.logo{display:flex;align-items:center;gap:8px;font-weight:1000;letter-spacing:2px;white-space:nowrap}
.badge{font-size:12px;background:#14532d;color:#bbf7d0;border:1px solid #22c55e66;border-radius:999px;padding:4px 9px;letter-spacing:1px}
.menuBtn,.backBtn{background:#17172f;color:#fff;border:1px solid #33335f;border-radius:14px;padding:10px 12px;font-weight:900;min-width:74px}
.backBtn{direction:ltr}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:none}.backdrop.open{display:block}
.drawer{position:fixed;top:0;right:0;width:min(88vw,370px);height:100vh;z-index:90;background:#0f0f22;border-left:1px solid #33335f;transform:translateX(105%);transition:.22s ease;box-shadow:-20px 0 55px #0009;padding:16px;overflow:auto}
.drawer.open{transform:none}.drawerHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.drawerTitle{font-weight:1000;font-size:20px}
.navList{display:grid;gap:9px}.navItem{width:100%;text-align:right;background:#15152b;color:#fff;border:1px solid #2f2f55;border-radius:16px;padding:14px;font-weight:900;display:flex;justify-content:space-between;align-items:center}
.navItem.active{background:#241042;border-color:#a855f7;box-shadow:0 0 0 2px #a855f733 inset}
main{padding-bottom:84px}.page{max-width:1080px;margin:0 auto;padding:16px}
.hero{padding:18px 16px 24px;border-bottom:1px solid #261d42;background:linear-gradient(180deg,#0a0a18,#140823)}
.searchBox{max-width:840px;margin:0 auto 18px;display:flex;align-items:center;gap:10px;background:#fff;border-radius:22px;padding:11px 14px;box-shadow:0 14px 40px #0007;color:#111827}
.searchBox input{flex:1;border:0;outline:0;background:transparent;color:#111827;font-size:17px;padding:8px;min-width:0}.searchBox button{background:#111827;color:#fff;border-radius:16px;padding:10px 14px;font-weight:900}
.heroBox{text-align:center;max-width:930px;margin:0 auto}.heroImage{height:285px;border-radius:28px;background:linear-gradient(135deg,#fff,#efeaff 45%,#c4b5fd);border:1px solid #c084fc;box-shadow:0 18px 65px #0008;margin:14px 0 18px;position:relative;overflow:hidden}
.robotSvg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:28px}
.title{font-size:42px;font-weight:1000;letter-spacing:6px;margin:8px 0}.title span{color:#a855f7}.subtitle{color:#d7d0ee;font-size:17px;line-height:1.7;max-width:760px;margin:0 auto}
.section{max-width:1080px;margin:0 auto;padding:18px 16px}.section h2,.page h2{font-size:28px;margin:10px 0 14px}
.catGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.cat{min-height:150px;border-radius:22px;overflow:hidden;background:#f8fafc;color:#111827;border:1px solid #ffffff22;box-shadow:0 16px 35px #0005;display:flex;flex-direction:column;padding:0}
.catTop{height:58px;min-height:58px}.cat:nth-child(1) .catTop{background:linear-gradient(120deg,#ede9fe,#c4b5fd)}.cat:nth-child(2) .catTop{background:linear-gradient(120deg,#a7f3d0,#60a5fa)}.cat:nth-child(3) .catTop{background:linear-gradient(120deg,#fde68a,#fb7185)}.cat:nth-child(4) .catTop{background:linear-gradient(120deg,#ddd6fe,#f0abfc)}.cat:nth-child(5) .catTop{background:linear-gradient(120deg,#93c5fd,#8b5cf6)}.cat:nth-child(6) .catTop{background:linear-gradient(120deg,#e5e7eb,#c4b5fd)}.cat:nth-child(7) .catTop{background:linear-gradient(120deg,#bbf7d0,#38bdf8)}.cat:nth-child(8) .catTop{background:linear-gradient(120deg,#fbcfe8,#c4b5fd)}
.catBody{flex:1;padding:13px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.catBody h3{margin:0 0 6px;color:#111827;font-size:20px}.catBody p{margin:0;color:#64748b;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{background:#111126;border:1px solid #2f2f55;border-radius:20px;padding:16px;color:#fff;box-shadow:0 12px 35px #0004}.card h3{margin:0 0 8px}.muted{color:#aaa6c8;line-height:1.55}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}.btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-radius:16px;padding:11px 14px;font-weight:1000;border:1px solid #ffffff22;text-decoration:none;display:inline-flex;align-items:center;gap:6px}.btn.alt{background:#17172f;border:1px solid #33335f}.btn.red{background:#7f1d1d}.btn.green{background:#14532d}
.input,.select,.textarea{width:100%;background:#0c0c1d;color:#fff;border:1px solid #33335f;border-radius:14px;padding:12px;outline:0;margin:6px 0}.textarea{min-height:90px;resize:vertical}
.faqItem{background:#111126;border:1px solid #2f2f55;border-radius:18px;margin:10px 0;overflow:hidden}.faqQ{padding:14px;font-weight:1000;cursor:pointer}.faqA{display:none;padding:0 14px 14px;color:#d4d0ea;line-height:1.6}.faqItem.open .faqA{display:block}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.result{background:#101025;border:1px solid #29294b;border-radius:14px;padding:12px;margin:8px 0;color:#fff;text-align:right}
.compareBox{display:grid;grid-template-columns:1fr 1fr;gap:12px}table{width:100%;border-collapse:separate;border-spacing:0 8px}th,td{background:#101025;border:1px solid #29294b;padding:12px;text-align:right;vertical-align:top}th{color:#c4b5fd;white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{text-align:center;background:#101025;border:1px solid #29294b;border-radius:18px;padding:14px}.stat strong{display:block;font-size:30px}
.modelImg{height:165px;border-radius:18px;margin-bottom:12px;border:1px solid #ffffff33;background:#fff center/contain no-repeat;box-shadow:inset 0 0 0 1px #0001}
.managerRow{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#0c0c1d;border:1px solid #33335f;border-radius:14px;padding:10px 12px;margin:7px 0}
.officialBox{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,#0f172a,#28104a);border:1px solid #7c3aed66;border-radius:22px;padding:16px;margin-top:14px;box-shadow:0 14px 45px #0006}
.cloudStatus{display:inline-flex;align-items:center;gap:6px;border:1px solid #22c55e55;border-radius:999px;padding:4px 8px;background:#14532d55;color:#bbf7d0;font-size:12px;font-weight:900}
.bottomNav{position:fixed;right:0;left:0;bottom:0;z-index:45;background:rgba(8,8,20,.94);backdrop-filter:blur(12px);border-top:1px solid #252546;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:7px 8px max(7px,env(safe-area-inset-bottom))}
.bottomNav button{background:transparent;color:#aaa6c8;border-radius:14px;padding:8px 4px;font-size:12px;font-weight:900}.bottomNav button.active{background:#241042;color:#fff}
@media(max-width:700px){.heroImage{height:245px}.title{font-size:34px}.grid{grid-template-columns:1fr}.compareBox{grid-template-columns:1fr}.officialBox{display:block}.logo{font-size:15px}.menuBtn,.backBtn{min-width:auto}}
</style>
</head>
<body>
<header class="topbar"><button class="menuBtn" id="menuBtn">☰ תפריט</button><div class="logo">NARWAL HUB <span class="badge">3.2</span></div><button class="backBtn" id="backBtn">← חזור</button></header>
<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer"><div class="drawerHead"><div class="drawerTitle">קטגוריות</div><button class="menuBtn" id="closeDrawerBtn">✕</button></div><div class="navList" id="navList"></div></aside>
<main id="app"></main>
<nav class="bottomNav" id="bottomNav"></nav>
<script>
const firebaseConfig = window.firebaseConfig || null;
(function(){
const modelImages={
 flow2:'data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350"><rect width="600" height="350" rx="34" fill="#f8fafc"/><rect x="185" y="55" width="230" height="190" rx="22" fill="#334155"/><rect x="205" y="75" width="190" height="135" rx="14" fill="#64748b"/><rect x="170" y="225" width="260" height="45" rx="22" fill="#1f2937"/><rect x="260" y="235" width="80" height="25" rx="12" fill="#111827"/><text x="300" y="315" text-anchor="middle" font-size="34" font-family="Arial" font-weight="900" fill="#111827">Narwal Flow 2</text></svg>`),
 flow:'data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350"><rect width="600" height="350" rx="34" fill="#eef2ff"/><ellipse cx="300" cy="175" rx="138" ry="86" fill="#fff" stroke="#a5b4fc" stroke-width="12"/><path d="M210 225h180" stroke="#7c3aed" stroke-width="18" stroke-linecap="round"/><text x="300" y="306" text-anchor="middle" font-size="34" font-family="Arial" font-weight="900" fill="#111827">Narwal Flow</text></svg>`),
 freoz:'data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350"><rect width="600" height="350" rx="34" fill="#f5f3ff"/><circle cx="300" cy="178" r="102" fill="#fff" stroke="#c084fc" stroke-width="13"/><circle cx="300" cy="178" r="32" fill="#111827"/><text x="300" y="306" text-anchor="middle" font-size="34" font-family="Arial" font-weight="900" fill="#111827">Freo Z Ultra</text></svg>`),
 freox:'data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350"><rect width="600" height="350" rx="34" fill="#ecfeff"/><circle cx="300" cy="178" r="98" fill="#fff" stroke="#67e8f9" stroke-width="13"/><path d="M245 178h110" stroke="#0891b2" stroke-width="22" stroke-linecap="round"/><text x="300" y="306" text-anchor="middle" font-size="34" font-family="Arial" font-weight="900" fill="#111827">Freo X Ultra</text></svg>`)
};
const DEFAULT_DATA={
 faq:[{cat:"כללי",q:"איך מחפשים תקלה באתר?",a:"אפשר לחפש לפי מילים כמו טיפות, מים, מפה, רולר או קוד תקלה. החיפוש בודק גם בתוך ה־FAQ."},{cat:"ניקוי",q:"למה יש טיפות מים אחרי ניקוי?",a:"בדרך כלל זה קשור למינון חומר, לכלוך ברולר או שאריות סבון. כדאי להפחית מינון, לנקות רולר ולהריץ ניקוי נוסף."},{cat:"תחנה",q:"מה עושים כשיש מים בתחנה?",a:"בודקים שמיכל מים מלוכלכים יושב טוב, שאין לכלוך באטמים, ושאין חסימה במגש או בניקוז."},{cat:"מפות",q:"למה השואב לא מזהה מפה או קומה?",a:"צריך לוודא שהמפה הנכונה נבחרה, שהשואב מתחיל מנקודת התחלה מוכרת, ושאין שינוי גדול בבית."}],
 errors:[{code:"3000",title:"בעיית ניקוז מים",fix:"בדוק מיכל מים מלוכלכים, אטמים, מגש תחנה וצינור ניקוז. נקה לכלוך והפעל שוב."},{code:"1183",title:"השואב נעצר באמצע פעולה",fix:"בדוק אם יש חסימה בגלגלים, רולר, מברשת צד או אזור צר שהשואב נתקע בו."}],
 videos:[{title:"מדריך תחזוקה בסיסי",url:"https://www.youtube.com/"},{title:"טיפים לשטיפה טובה יותר",url:"https://www.youtube.com/"}],
 models:[{name:"Narwal Flow 2",suction:"31,000Pa",wash:"FlowWash Roller",ai:"NarMind Pro",note:"דגם פרימיום מתקדם",image:"flow2"},{name:"Narwal Flow",suction:"22,000Pa",wash:"FlowWash Roller",ai:"Smart Mapping",note:"שואב שוטף חכם",image:"flow"},{name:"Narwal Freo Z Ultra",suction:"12,000Pa",wash:"Dual Mop",ai:"Dual AI",note:"AI מתקדם",image:"freoz"},{name:"Narwal Freo X Ultra",suction:"8,200Pa",wash:"Mop Pads",ai:"DirtSense",note:"חזק ויציב",image:"freox"}]
};
const DEFAULT_USERS=[{username:"shoval",password:"1234",name:"שובל",role:"main"}];
const routes=[["home","בית","🏠"],["models","דגמים","🤖"],["compare","השוואה","⚖️"],["errors","תקלות","🔧"],["faq","FAQ","❓"],["videos","סרטונים","🎥"],["official","Narwal ישראל","🌐"],["downloads","הורדת אפליקציה","📲"],["device","תיק מכשיר","🧾"],["admin","ניהול","👑"]];
let db=null,firebaseReady=false;let users=loadUsers();let currentUser=loadCurrentUser();
const state={page:"home",history:[],isAdmin:!!currentUser,data:loadLocal(),online:0,visitsToday:0,totalVisits:0};
function clone(x){return JSON.parse(JSON.stringify(x))}
function loadLocal(){try{const s=JSON.parse(localStorage.getItem("nh3_data")||"null");if(s)return Object.assign(clone(DEFAULT_DATA),s)}catch(e){}return clone(DEFAULT_DATA)}
function loadUsers(){try{const u=JSON.parse(localStorage.getItem("nh3_users")||"null");if(Array.isArray(u)&&u.length)return u}catch(e){}return clone(DEFAULT_USERS)}
function loadCurrentUser(){try{return JSON.parse(localStorage.getItem("nh3_current_user")||"null")}catch(e){return null}}
function saveLocal(){localStorage.setItem("nh3_data",JSON.stringify(state.data))}
function saveUsers(){localStorage.setItem("nh3_users",JSON.stringify(users));if(firebaseReady&&db)db.ref("narwalHub3/users").set(users).catch(()=>{})}
function saveCloud(){saveLocal();if(firebaseReady&&db)db.ref("narwalHub3/content").set(state.data).catch(()=>{})}
function initFirebase(){try{if(window.firebase&&firebaseConfig&&!firebase.apps.length)firebase.initializeApp(firebaseConfig);if(window.firebase&&firebase.database){db=firebase.database();firebaseReady=true;db.ref("narwalHub3/content").on("value",s=>{const v=s.val();if(v){state.data=Object.assign(clone(DEFAULT_DATA),v);saveLocal();render()}});db.ref("narwalHub3/users").on("value",s=>{const v=s.val();if(Array.isArray(v)&&v.length){users=v;localStorage.setItem("nh3_users",JSON.stringify(users));if(state.page==="admin")render()}});trackVisit();trackOnline();}}catch(e){firebaseReady=false;console.log("Firebase not connected",e)}}
function todayKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function trackVisit(){if(!db)return;const k="nh3_visit_"+todayKey();if(localStorage.getItem(k)!=="1"){localStorage.setItem(k,"1");db.ref("narwalHub3/analytics/visits/total").transaction(v=>(v||0)+1);db.ref("narwalHub3/analytics/visits/days/"+todayKey()).transaction(v=>(v||0)+1)}db.ref("narwalHub3/analytics/visits/total").on("value",s=>{state.totalVisits=s.val()||0;if(state.page==="admin")render()});db.ref("narwalHub3/analytics/visits/days/"+todayKey()).on("value",s=>{state.visitsToday=s.val()||0;if(state.page==="admin")render()})}
function trackOnline(){if(!db)return;const id="s_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);const ref=db.ref("narwalHub3/online/"+id);function payload(){return{ts:firebase.database.ServerValue.TIMESTAMP,localTs:Date.now(),page:state.page,device:/iPhone|iPad/.test(navigator.userAgent)?"iPhone":/Android/.test(navigator.userAgent)?"Android":"Desktop"}}ref.set(payload());ref.onDisconnect().remove();setInterval(()=>ref.update(payload()),15000);db.ref("narwalHub3/online").on("value",snap=>{const val=snap.val()||{},now=Date.now();state.online=Object.values(val).filter(x=>now-(x.localTs||0)<70000).length;if(state.page==="admin")render()})}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function go(p){if(p!==state.page)state.history.push(state.page);state.page=p;closeDrawer();render();scrollTo(0,0)}
function goBack(){const p=state.history.pop();if(p){state.page=p;closeDrawer();render();scrollTo(0,0)}else go("home")}
function openDrawer(){drawer.classList.add("open");backdrop.classList.add("open")}
function closeDrawer(){drawer.classList.remove("open");backdrop.classList.remove("open")}
function navHtml(){return routes.map(([id,l,i])=>`<button class="navItem ${state.page===id?"active":""}" data-route="${id}"><span>${i} ${l}</span><span>›</span></button>`).join("")}
function bottomHtml(){return [["home","בית","🏠"],["compare","השוואה","⚖️"],["faq","FAQ","❓"],["downloads","אפליקציה","📲"],["admin","ניהול","👑"]].map(([id,l,i])=>`<button class="${state.page===id?"active":""}" data-route="${id}">${i}<br>${l}</button>`).join("")}
function cat(r,t,d){return`<button class="cat" data-route="${r}"><div class="catTop"></div><div class="catBody"><h3>${t}</h3><p>${d}</p></div></button>`}
function modelImageSrc(m){if(m.image&&modelImages[m.image])return modelImages[m.image];if(m.image&&/^https?:\/\//.test(m.image))return m.image;return modelImages.flow2}
function robotSvg(){return`<svg class="robotSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350"><rect width="600" height="350" rx="34" fill="transparent"/><rect x="185" y="40" width="230" height="190" rx="22" fill="#334155"/><rect x="205" y="60" width="190" height="135" rx="14" fill="#64748b"/><rect x="170" y="210" width="260" height="55" rx="26" fill="#1f2937"/><rect x="260" y="225" width="80" height="25" rx="12" fill="#111827"/><text x="300" y="315" text-anchor="middle" font-size="34" font-family="Arial" font-weight="900" fill="#111827">Narwal Flow 2</text></svg>`}
function cloudPill(){return `<span class="cloudStatus">${firebaseReady?"☁️ ענן מחובר":"⚠️ ענן לא מחובר"}</span>`}
function home(){return`<section class="hero"><div class="searchBox"><span>🔎</span><input id="globalSearch" placeholder="חפש תקלה, FAQ, סרטון או דגם..." oninput="Narwal.search(this.value)"><button onclick="Narwal.search(document.getElementById('globalSearch').value)">חפש</button></div><div id="searchResults" style="max-width:840px;margin:0 auto"></div><div class="heroBox"><div class="heroImage">${robotSvg()}</div><div class="title">NARWAL <span>HUB</span></div><p class="subtitle">מרכז הידע הישראלי למוצרי Narwal — דגמים, תקלות, FAQ, סרטונים, השוואות, הורדות וניהול מסודר.</p><div style="margin-top:12px">${cloudPill()}</div></div></section><section class="section"><h2>קטגוריות</h2><div class="catGrid">${cat("models","דגמים 🤖","תמונות ומפרטים")}${cat("compare","השוואה ⚖️","השווה בין דגמים")}${cat("errors","תקלות 🔧","פתרון לפי קוד")}${cat("faq","FAQ ❓","שאלות נפוצות")}${cat("videos","סרטונים 🎥","מדריכים ועדכונים")}${cat("downloads","הורדת אפליקציה 📲","iPhone / Android")}${cat("official","Narwal ישראל 🌐","האתר הרשמי")}${cat("device","תיק מכשיר 🧾","שמירה אישית")}</div></section>`}
function adminAdd(type,label){return state.isAdmin?`<div class="toolbar"><button class="btn" onclick="Narwal.add('${type}')">➕ ${label}</button></div>`:""}
function adminActions(type,i){return state.isAdmin?`<div class="actions"><button class="btn alt" onclick="Narwal.edit('${type}',${i})">✏️ ערוך</button><button class="btn red" onclick="Narwal.del('${type}',${i})">🗑️ מחק</button></div>`:""}
function models(){return`<section class="page"><h2>דגמים</h2>${adminAdd("model","הוסף דגם")}<div class="grid">${state.data.models.map((m,i)=>`<div class="card"><div class="modelImg" style="background-image:url('${modelImageSrc(m)}')"></div><h3>${esc(m.name)}</h3><p class="muted">${esc(m.note)}</p><table><tr><th>שאיבה</th><td>${esc(m.suction)}</td></tr><tr><th>שטיפה</th><td>${esc(m.wash)}</td></tr><tr><th>AI</th><td>${esc(m.ai)}</td></tr></table>${adminActions("model",i)}</div>`).join("")}</div></section>`}
function compare(){const opts=state.data.models.map((m,i)=>`<option value="${i}">${esc(m.name)}</option>`).join("");return`<section class="page"><h2>השוואת דגמים</h2><div class="card"><div class="compareBox"><select class="select" id="cmpA">${opts}</select><select class="select" id="cmpB">${opts}</select></div><button class="btn" onclick="Narwal.runCompare()">השווה</button><div id="compareOut"></div></div></section>`}
function errors(){return`<section class="page"><h2>תקלות וקודי שגיאה</h2>${adminAdd("error","הוסף תקלה")}<div class="grid">${state.data.errors.map((e,i)=>`<div class="card"><h3>${esc(e.code)} · ${esc(e.title)}</h3><p class="muted">${esc(e.fix)}</p>${adminActions("error",i)}</div>`).join("")}</div></section>`}
function faq(){return`<section class="page"><h2>FAQ</h2>${adminAdd("faq","הוסף FAQ")}<div class="searchBox" style="box-shadow:none;margin:0 0 12px"><span>🔎</span><input id="faqSearch" placeholder="חיפוש FAQ..." oninput="Narwal.searchFAQ(this.value)"></div><div id="faqResults"></div>${state.data.faq.map((f,i)=>`<div class="faqItem"><div class="faqQ" onclick="this.parentElement.classList.toggle('open')">${esc(f.q)}</div><div class="faqA">${esc(f.a)}${adminActions("faq",i)}</div></div>`).join("")}</section>`}
function videos(){return`<section class="page"><h2>סרטונים</h2>${adminAdd("video","הוסף סרטון")}<div class="grid">${state.data.videos.map((v,i)=>`<div class="card"><h3>🎥 ${esc(v.title)}</h3><p class="muted" style="word-break:break-all">${esc(v.url)}</p><div class="actions"><button class="btn alt" onclick="window.open('${esc(v.url)}','_blank')">פתח</button>${adminActions("video",i)}</div></div>`).join("")}</div></section>`}
function official(){return`<section class="page"><h2>Narwal ישראל</h2><div class="officialBox"><div><h3>האתר הרשמי של Narwal בישראל</h3><p class="muted">קישור מהיר לאתר, שירות, מוצרים ומדריכים.</p></div><a class="btn" href="https://narwal.co.il/" target="_blank" rel="noopener">פתח אתר 🌐</a></div><div class="grid" style="margin-top:12px"><div class="card"><h3>שירות ותמיכה</h3><p class="muted">עמוד יצירת קשר רשמי.</p><a class="btn alt" href="https://narwal.co.il/pages/contact-us" target="_blank" rel="noopener">יצירת קשר</a></div><div class="card"><h3>דגמים</h3><p class="muted">מעבר לקטגוריית הדגמים באתר שלך.</p><button class="btn alt" data-route="models">פתח דגמים</button></div></div></section>`}
function downloads(){return`<section class="page"><h2>הורדת אפליקציית Narwal</h2><div class="grid"><div class="card"><h3> iPhone / iOS</h3><p class="muted">הורדה דרך App Store. שם האפליקציה: <b>Narwal</b>.</p><a class="btn" href="https://apps.apple.com/search?term=Narwal" target="_blank" rel="noopener">פתח ב־App Store</a></div><div class="card"><h3>🤖 Android</h3><p class="muted">הורדה דרך Google Play. שם האפליקציה: <b>Narwal</b>.</p><a class="btn" href="https://play.google.com/store/search?q=Narwal&c=apps" target="_blank" rel="noopener">פתח ב־Google Play</a></div></div><div class="card" style="margin-top:12px"><h3>טיפ</h3><p class="muted">אם הקישור לא נפתח, חפש בחנות האפליקציות: <b>Narwal</b>.</p></div></section>`}
function device(){return`<section class="page"><h2>תיק מכשיר</h2><div class="card"><h3>🧾 בקרוב</h3><p class="muted">כאן יהיה אפשר לשמור דגם, תאריך רכישה, אחריות ותקלות אישיות.</p></div></section>`}
function admin(){if(!state.isAdmin)return`<section class="page"><h2>כניסת מנהל</h2><div class="card"><input class="input" id="adminUser" placeholder="שם משתמש" autocomplete="username"><input class="input" id="adminPass" placeholder="סיסמה" type="password" autocomplete="current-password"><button class="btn" onclick="Narwal.login()">כניסה</button><p class="muted">ברירת מחדל: משתמש <b>shoval</b> סיסמה <b>1234</b></p></div></section>`;return`<section class="page"><h2>ניהול</h2><div class="toolbar">${cloudPill()}</div><div class="stats"><div class="stat"><span>מחוברים עכשיו</span><strong>${state.online}</strong></div><div class="stat"><span>כניסות היום</span><strong>${state.visitsToday}</strong></div><div class="stat"><span>סה״כ כניסות</span><strong>${state.totalVisits}</strong></div><div class="stat"><span>Firebase</span><strong>${firebaseReady?"מחובר":"לא"}</strong></div></div><div class="grid" style="margin-top:12px"><div class="card"><h3>FAQ</h3><p class="muted">${state.data.faq.length} שאלות</p><button class="btn" data-route="faq">ניהול FAQ</button></div><div class="card"><h3>תקלות</h3><p class="muted">${state.data.errors.length} תקלות</p><button class="btn" data-route="errors">ניהול תקלות</button></div><div class="card"><h3>סרטונים</h3><p class="muted">${state.data.videos.length} סרטונים</p><button class="btn" data-route="videos">ניהול סרטונים</button></div><div class="card"><h3>מנהלים</h3><p class="muted">מחובר: ${esc(currentUser?.name||currentUser?.username||"מנהל")}</p>${users.map((u,i)=>`<div class="managerRow"><span>${esc(u.name||u.username)} <small class="muted">(${esc(u.username)})</small></span>${u.role==="main"?"<small>ראשי</small>":`<button class="btn red" onclick="Narwal.removeManager(${i})">מחק</button>`}</div>`).join("")}<div class="toolbar"><button class="btn" onclick="Narwal.addManager()">➕ הוסף מנהל</button></div></div><div class="card"><h3>פעולות</h3><button class="btn alt" onclick="Narwal.exportData()">ייצוא JSON</button> <button class="btn red" onclick="Narwal.logout()">יציאה</button></div></div></section>`}
function render(){navList.innerHTML=navHtml();bottomNav.innerHTML=bottomHtml();app.innerHTML=({home,models,compare,errors,faq,videos,official,downloads,device,admin}[state.page]||home)();if(state.page==="compare")setTimeout(runCompare,50);bindRoutes()}
function bindRoutes(){document.querySelectorAll("[data-route]").forEach(el=>{el.onclick=e=>{e.preventDefault();e.stopPropagation();go(el.dataset.route)}})}
function login(){const username=(document.getElementById("adminUser")?.value||"").trim();const password=(document.getElementById("adminPass")?.value||"").trim();const user=users.find(u=>u.username===username&&u.password===password);if(user){currentUser=user;state.isAdmin=true;localStorage.setItem("nh3_current_user",JSON.stringify(user));go("admin")}else alert("שם משתמש או סיסמה לא נכונים")}
function logout(){currentUser=null;state.isAdmin=false;localStorage.removeItem("nh3_current_user");go("home")}
function add(type){if(type==="faq"){const cat=prompt("קטגוריה:","כללי");if(!cat)return;const q=prompt("שאלה:");if(!q)return;const a=prompt("תשובה:");if(!a)return;state.data.faq.unshift({cat,q,a});saveCloud();go("faq")}if(type==="error"){const code=prompt("קוד תקלה:");if(!code)return;const title=prompt("כותרת:");if(!title)return;const fix=prompt("פתרון:");if(!fix)return;state.data.errors.unshift({code,title,fix});saveCloud();go("errors")}if(type==="video"){const title=prompt("שם הסרטון:");if(!title)return;const url=prompt("קישור YouTube:");if(!url)return;state.data.videos.unshift({title,url});saveCloud();go("videos")}if(type==="model"){const name=prompt("שם דגם:");if(!name)return;const suction=prompt("שאיבה:","");const wash=prompt("שטיפה:","");const ai=prompt("AI:","");const note=prompt("הערה:","");const image=prompt("תמונה: flow2 / flow / freoz / freox או URL","flow2");state.data.models.unshift({name,suction,wash,ai,note,image});saveCloud();go("models")}}
function edit(type,i){const map={faq:"faq",error:"errors",video:"videos",model:"models"};if(type==="faq"){const item=state.data.faq[i];if(!item)return;const cat=prompt("קטגוריה:",item.cat);if(!cat)return;const q=prompt("שאלה:",item.q);if(!q)return;const a=prompt("תשובה:",item.a);if(!a)return;state.data.faq[i]={cat,q,a}}if(type==="error"){const item=state.data.errors[i];if(!item)return;const code=prompt("קוד תקלה:",item.code);if(!code)return;const title=prompt("כותרת:",item.title);if(!title)return;const fix=prompt("פתרון:",item.fix);if(!fix)return;state.data.errors[i]={code,title,fix}}if(type==="video"){const item=state.data.videos[i];if(!item)return;const title=prompt("שם הסרטון:",item.title);if(!title)return;const url=prompt("קישור:",item.url);if(!url)return;state.data.videos[i]={title,url}}if(type==="model"){const item=state.data.models[i];if(!item)return;const name=prompt("שם דגם:",item.name);if(!name)return;const suction=prompt("שאיבה:",item.suction);const wash=prompt("שטיפה:",item.wash);const ai=prompt("AI:",item.ai);const note=prompt("הערה:",item.note);const image=prompt("תמונה:",item.image||"flow2");state.data.models[i]={name,suction,wash,ai,note,image}}saveCloud();go(map[type])}
function del(type,i){if(!confirm("למחוק?"))return;const map={faq:["faq","faq"],error:["errors","errors"],video:["videos","videos"],model:["models","models"]};const [arr,page]=map[type];state.data[arr].splice(i,1);saveCloud();go(page)}
function runCompare(){const a=+document.getElementById("cmpA")?.value||0,b=+document.getElementById("cmpB")?.value||1,A=state.data.models[a],B=state.data.models[b],out=document.getElementById("compareOut");if(!out||!A||!B)return;out.innerHTML=`<table><tr><th>דגם</th><td>${esc(A.name)}</td><td>${esc(B.name)}</td></tr><tr><th>שאיבה</th><td>${esc(A.suction)}</td><td>${esc(B.suction)}</td></tr><tr><th>שטיפה</th><td>${esc(A.wash)}</td><td>${esc(B.wash)}</td></tr><tr><th>AI</th><td>${esc(A.ai)}</td><td>${esc(B.ai)}</td></tr><tr><th>הערה</th><td>${esc(A.note)}</td><td>${esc(B.note)}</td></tr></table>`}
function searchFAQ(q){q=(q||"").toLowerCase().trim();const box=document.getElementById("faqResults");if(!box)return;if(!q){box.innerHTML="";return}const res=state.data.faq.filter(f=>(f.cat+" "+f.q+" "+f.a).toLowerCase().includes(q));box.innerHTML=res.length?res.map(f=>`<div class="result"><b>${esc(f.q)}</b><br><span class="muted">${esc(f.a)}</span></div>`).join(""):`<div class="result">לא נמצאו תוצאות</div>`}
function search(q){q=(q||"").toLowerCase().trim();const box=document.getElementById("searchResults");if(!box)return;if(!q){box.innerHTML="";return}const out=[];state.data.faq.forEach(f=>{if((f.cat+" "+f.q+" "+f.a).toLowerCase().includes(q))out.push(["FAQ",f.q,f.a,"faq"])});state.data.errors.forEach(e=>{if((e.code+" "+e.title+" "+e.fix).toLowerCase().includes(q))out.push(["תקלה",e.code+" · "+e.title,e.fix,"errors"])});state.data.models.forEach(m=>{if(JSON.stringify(m).toLowerCase().includes(q))out.push(["דגם",m.name,m.note,"models"])});state.data.videos.forEach(v=>{if(JSON.stringify(v).toLowerCase().includes(q))out.push(["סרטון",v.title,v.url,"videos"])});box.innerHTML=out.length?out.slice(0,10).map(r=>`<div class="result" data-route="${r[3]}"><b>${esc(r[0])} · ${esc(r[1])}</b><br><span class="muted">${esc(r[2])}</span></div>`).join(""):`<div class="result">לא נמצאו תוצאות</div>`;bindRoutes()}
function addManager(){if(!state.isAdmin)return;const username=prompt("שם משתמש למנהל:");if(!username)return;if(users.some(u=>u.username===username))return alert("שם משתמש כבר קיים");const name=prompt("שם להצגה:",username)||username;const password=prompt("סיסמה:","1234");if(!password)return;users.push({username,password,name,role:"manager"});saveUsers();render()}
function removeManager(i){const u=users[i];if(!u||u.role==="main")return alert("אי אפשר למחוק מנהל ראשי");if(!confirm("למחוק מנהל?"))return;users.splice(i,1);saveUsers();render()}
function exportData(){const blob=new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="narwal-hub-data.json";a.click()}
window.Narwal={go,goBack,login,logout,add,edit,del,runCompare,searchFAQ,search,exportData,addManager,removeManager};
document.getElementById("menuBtn").onclick=openDrawer;document.getElementById("closeDrawerBtn").onclick=closeDrawer;document.getElementById("backdrop").onclick=closeDrawer;document.getElementById("backBtn").onclick=goBack;
let sx=0,sy=0;document.addEventListener("touchstart",e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY},{passive:true});document.addEventListener("touchend",e=>{const t=e.changedTouches[0];if(sx<30&&t.clientX-sx>85&&Math.abs(t.clientY-sy)<70)goBack()},{passive:true});
initFirebase();render();
})();
</script>
</body>
</html>
