<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Narwal Hub 5.1.2</title>
<meta name="theme-color" content="#080814">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<style>
:root{
  --bg:#080814;--panel:#111126;--panel2:#17172f;--text:#fff;--muted:#aaa6c8;
  --line:#2f2f55;--purple:#8b5cf6;--purple2:#a855f7;--green:#22c55e;--red:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#1d1237 0,#080814 40%,#070711 100%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100vh;overscroll-behavior-x:none}
button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}a{color:inherit}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:rgba(8,8,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid #252546}
.logo{display:flex;align-items:center;gap:8px;font-weight:1000;letter-spacing:2px;white-space:nowrap}
.badge{font-size:12px;background:#14532d;color:#bbf7d0;border:1px solid #22c55e66;border-radius:999px;padding:4px 9px;letter-spacing:1px}
.menuBtn,.backBtn{background:#17172f;color:#fff;border:1px solid #33335f;border-radius:14px;padding:10px 12px;font-weight:900;min-width:74px}
.backBtn{direction:ltr}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:80;display:none}.backdrop.open{display:block}
.drawer{position:fixed;top:0;right:0;width:min(88vw,370px);height:100vh;z-index:90;background:#0f0f22;border-left:1px solid #33335f;transform:translateX(105%);transition:.22s ease;box-shadow:-20px 0 55px #0009;padding:16px;overflow:auto}
.drawer.open{transform:none}.drawerHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.drawerTitle{font-weight:1000;font-size:20px}
.navList{display:grid;gap:9px}.navItem{width:100%;text-align:right;background:#15152b;color:#fff;border:1px solid #2f2f55;border-radius:16px;padding:14px;font-weight:900;display:flex;justify-content:space-between;align-items:center}
.navItem.active{background:#241042;border-color:#a855f7;box-shadow:0 0 0 2px #a855f733 inset}
main{padding-bottom:84px}.page{max-width:1080px;margin:0 auto;padding:16px}
.hero{padding:18px 16px 24px;border-bottom:1px solid #261d42;background:linear-gradient(180deg,#0a0a18,#140823)}
.searchBox{max-width:840px;margin:0 auto 18px;display:flex;align-items:center;gap:10px;background:#fff;border-radius:22px;padding:11px 14px;box-shadow:0 14px 40px #0007;color:#111827}
.searchBox input{flex:1;border:0;outline:0;background:transparent;color:#111827;font-size:17px;padding:8px;min-width:0}.searchBox button{background:#111827;color:#fff;border-radius:16px;padding:10px 14px;font-weight:900}
.heroBox{text-align:center;max-width:930px;margin:0 auto}
.heroImage{height:285px;border-radius:28px;background:linear-gradient(135deg,#fff,#efeaff 45%,#c4b5fd);border:1px solid #c084fc;box-shadow:0 18px 65px #0008;margin:14px 0 18px;position:relative;overflow:hidden}
.heroRealImg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:18px}
.title{font-size:42px;font-weight:1000;letter-spacing:6px;margin:8px 0}.title span{color:#a855f7}.subtitle{color:#d7d0ee;font-size:17px;line-height:1.7;max-width:760px;margin:0 auto}
.section{max-width:1080px;margin:0 auto;padding:18px 16px}.section h2,.page h2{font-size:28px;margin:10px 0 14px}
.catGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.cat{min-height:150px;border-radius:22px;overflow:hidden;background:#f8fafc;color:#111827;border:1px solid #ffffff22;box-shadow:0 16px 35px #0005;display:flex;flex-direction:column;padding:0}
.catTop{height:58px;min-height:58px}.cat:nth-child(1) .catTop{background:linear-gradient(120deg,#ede9fe,#c4b5fd)}.cat:nth-child(2) .catTop{background:linear-gradient(120deg,#a7f3d0,#60a5fa)}.cat:nth-child(3) .catTop{background:linear-gradient(120deg,#fde68a,#fb7185)}.cat:nth-child(4) .catTop{background:linear-gradient(120deg,#ddd6fe,#f0abfc)}.cat:nth-child(5) .catTop{background:linear-gradient(120deg,#93c5fd,#8b5cf6)}.cat:nth-child(6) .catTop{background:linear-gradient(120deg,#e5e7eb,#c4b5fd)}.cat:nth-child(7) .catTop{background:linear-gradient(120deg,#bbf7d0,#38bdf8)}.cat:nth-child(8) .catTop{background:linear-gradient(120deg,#fbcfe8,#c4b5fd)}
.catBody{flex:1;padding:13px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}.catBody h3{margin:0 0 6px;color:#111827;font-size:20px}.catBody p{margin:0;color:#64748b;font-weight:800}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.card{background:#111126;border:1px solid #2f2f55;border-radius:20px;padding:16px;color:#fff;box-shadow:0 12px 35px #0004}.card h3{margin:0 0 8px}.muted{color:#aaa6c8;line-height:1.55}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 14px}.btn{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border-radius:16px;padding:11px 14px;font-weight:1000;border:1px solid #ffffff22;text-decoration:none;display:inline-flex;align-items:center;gap:6px}.btn.alt{background:#17172f;border:1px solid #33335f}.btn.red{background:#7f1d1d}.btn.green{background:#14532d}
.input,.select,.textarea{width:100%;background:#0c0c1d;color:#fff;border:1px solid #33335f;border-radius:14px;padding:12px;outline:0;margin:6px 0}.textarea{min-height:90px;resize:vertical}
.faqItem{background:#111126;border:1px solid #2f2f55;border-radius:18px;margin:10px 0;overflow:hidden}.faqQ{padding:14px;font-weight:1000;cursor:pointer}.faqA{display:none;padding:0 14px 14px;color:#d4d0ea;line-height:1.6}.faqItem.open .faqA{display:block}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.result{background:#101025;border:1px solid #29294b;border-radius:14px;padding:12px;margin:8px 0;color:#fff;text-align:right}
.compareBox{display:grid;grid-template-columns:1fr 1fr;gap:12px}table{width:100%;border-collapse:separate;border-spacing:0 8px}th,td{background:#101025;border:1px solid #29294b;padding:12px;text-align:right;vertical-align:top}th{color:#c4b5fd;white-space:nowrap}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{text-align:center;background:#101025;border:1px solid #29294b;border-radius:18px;padding:14px}.stat strong{display:block;font-size:30px}
.modelImg{height:165px;border-radius:18px;margin-bottom:12px;border:1px solid #ffffff33;background:#fff center/contain no-repeat;box-shadow:inset 0 0 0 1px #0001}
.modelBadge{display:inline-block;font-size:11px;font-weight:900;border-radius:999px;padding:3px 10px;margin-right:8px;vertical-align:middle}
.badgePurple{background:#3b0764;color:#e9d5ff;border:1px solid #7c3aed66}
.badgeGreen{background:#14532d;color:#bbf7d0;border:1px solid #22c55e66}
.badgeBlue{background:#1e3a8a;color:#bfdbfe;border:1px solid #3b82f666}
.modelCategory{color:#aaa6c8;font-size:13px;margin:-4px 0 10px;font-weight:700}
.specGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.specItem{background:#0c0c1d;border:1px solid #29294b;border-radius:14px;padding:10px 5px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.specIcon{font-size:19px;line-height:1}
.specLabel{font-size:10.5px;color:#aaa6c8;font-weight:800;line-height:1.25}
.specValue{font-size:12px;font-weight:1000;color:#fff;line-height:1.25}
@media(max-width:380px){.specGrid{grid-template-columns:repeat(2,1fr)}}
.compareImg{width:100%;height:135px;border-radius:16px;background:#fff center/contain no-repeat;border:1px solid #ffffff33;margin-bottom:8px}
.modelMini{display:flex;flex-direction:column;gap:6px;align-items:center;text-align:center}
.galleryWrap{display:grid;gap:8px;margin-bottom:12px}.galleryMain{height:220px;border-radius:18px;border:1px solid #ffffff33;background:#fff center/contain no-repeat}.galleryThumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.galleryThumb{height:70px;border-radius:12px;border:1px solid #ffffff33;background:#fff center/contain no-repeat}
.managerRow{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#0c0c1d;border:1px solid #33335f;border-radius:14px;padding:10px 12px;margin:7px 0}
.officialBox{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,#0f172a,#28104a);border:1px solid #7c3aed66;border-radius:22px;padding:16px;margin-top:14px;box-shadow:0 14px 45px #0006}
.cloudStatus{display:inline-flex;align-items:center;gap:6px;border:1px solid #22c55e55;border-radius:999px;padding:4px 8px;background:#14532d55;color:#bbf7d0;font-size:12px;font-weight:900}
.cloudStatus.off{border-color:#f59e0b66;background:#422006;color:#fde68a}
.adminPanel{display:grid;gap:14px}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.permGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px}.permBox{display:flex;align-items:center;gap:8px;background:#0c0c1d;border:1px solid #33335f;border-radius:12px;padding:10px}
.userBadge{display:inline-flex;gap:6px;align-items:center;border:1px solid #7c3aed66;border-radius:999px;padding:4px 8px;background:#241042;color:#fff;font-size:12px;font-weight:900}
.bottomNav{position:fixed;right:0;left:0;bottom:0;z-index:45;background:rgba(8,8,20,.94);backdrop-filter:blur(12px);border-top:1px solid #252546;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:7px 8px max(7px,env(safe-area-inset-bottom))}
.bottomNav button{background:transparent;color:#aaa6c8;border-radius:14px;padding:8px 4px;font-size:12px;font-weight:900}.bottomNav button.active{background:#241042;color:#fff}
@media(max-width:700px){.heroImage{height:245px}.title{font-size:34px}.grid{grid-template-columns:1fr}.compareBox{grid-template-columns:1fr}.officialBox{display:block}.logo{font-size:15px}.menuBtn,.backBtn{min-width:auto}.formGrid,.permGrid{grid-template-columns:1fr}.galleryMain{height:190px}.galleryThumb{height:62px}}

/* NARWAL HUB 5.1 FIX */
.heroImage{
  height:315px!important;

  justify-content:center!important;
  overflow:hidden!important;
}
.heroRealImg{
  position:static!important;

  height:92%!important;

  display:block!important;

}
.whatsNewBox{margin-top:16px}
.whatsNewList{display:grid;gap:9px;margin-top:10px}
.whatsNewItem{
  width:100%;
  background:#0c0c1d;
  border:1px solid #33335f;
  border-radius:16px;
  padding:12px;
  color:#fff;
  text-align:right;
}
.whatsNewItem b{display:block;margin-bottom:4px}
.whatsNewDate{font-size:12px;color:#aaa6c8;font-weight:800}

  .heroImage{height:285px!important}
}

  display:flex!important;
  align-items:center!important;
  justify-content:center!important;

}

  position:static!important;

.adminEditHint{
  font-size:12px;color:#bbf7d0;background:#14532d55;border:1px solid #22c55e66;
  border-radius:999px;padding:4px 8px;display:inline-flex;margin-bottom:8px;font-weight:900
}
@media(max-width:700px){.heroImage{height:285px!important}}


/* 5.1.2 managers */
.managerTools{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.managerRoleTag{display:inline-flex;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;border:1px solid #7c3aed66;background:#241042;color:#fff}
.managerPerms{font-size:12px;color:#aaa6c8;line-height:1.5;margin-top:4px}

</style>

function trackOnline(){if(!db)return;const id="s_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);const ref=db.ref("narwalHub4/online/"+id);function payload(){return{ts:firebase.database.ServerValue.TIMESTAMP,localTs:Date.now(),page:state.page,device:/iPhone|iPad/.test(navigator.userAgent)?"iPhone":/Android/.test(navigator.userAgent)?"Android":"Desktop"}}ref.set(payload());ref.onDisconnect().remove();setInterval(()=>ref.update(payload()),15000);db.ref("narwalHub4/online").on("value",snap=>{const val=snap.val()||{},now=Date.now();state.online=Object.values(val).filter(x=>now-(x.localTs||0)<70000).length;if(state.page==="admin")render()})}

function ensureNewsData(){

function addAutoNews(type,title,route){

  state.data.news = state.data.news.filter(n=>n.key!==key);
  state.data.news.unshift({key:key,type:type,text:text,route:route||"home",date:nowText()});
  state.data.news = state.data.news.slice(0,20);
}
function cleanupNews(){
  ensureNewsData();
  state.data.news = state.data.news.filter(n=>{
    const text=String(n.text||"");
    if(n.type==="faq") return state.data.faq.some(f=>text.includes(f.q));
    if(n.type==="error") return state.data.errors.some(e=>text.includes(e.code)||text.includes(e.title));
    if(n.type==="video") return state.data.videos.some(v=>text.includes(v.title));
    if(n.type==="model") return state.data.models.some(m=>text.includes(m.name));
    return true;
  });
}

        <div class="managerPerms">הרשאות: ${esc((u.perms||[]).map(permLabel).join(", ")||"ללא")}</div>
      </div>
    </div>
    <div class="managerTools">
      <button class="btn alt" onclick="Narwal.editManagerProfile(${i})">✏️ ערוך שם/שם משתמש</button>
      <button class="btn alt" onclick="Narwal.resetManagerPassword(${i})">🔑 איפוס סיסמה</button>
      <button class="btn alt" onclick="Narwal.editManager(${i})">🛡️ הרשאות</button>
      ${u.username==="shoval"?"<span class='muted'>מנהל ראשי קבוע</span>":`<button class="btn alt" onclick="Narwal.toggleManagerRole(${i})">🔁 שנה תפקיד</button><button class="btn red" onclick="Narwal.removeManager(${i})">🗑️ מחק</button>`}
    </div>
  </div>`).join("")}</div>
</div>`}
function admin(){if(!state.isAdmin)return`<section class="page"><h2>כניסת מנהל</h2><div class="card"><div class="formGrid"><input class="input" id="adminUser" placeholder="שם משתמש" autocomplete="username"><input class="input" id="adminPass" placeholder="סיסמה" type="password" autocomplete="current-password"></div><label class="permBox"><input type="checkbox" id="rememberMe" checked> זכור אותי</label><button class="btn" onclick="Narwal.login()">כניסה</button></div></section>`;return`<section class="page"><h2>ניהול</h2><div class="toolbar">${cloudPill()} <span class="userBadge">👤 ${esc(currentUser?.name||currentUser?.username)} · ${currentUser?.role==="main"?"מנהל ראשי":"מנהל"}</span></div><div class="stats"><div class="stat"><span>מחוברים עכשיו</span><strong>${state.online}</strong></div><div class="stat"><span>כניסות היום</span><strong>${state.visitsToday}</strong></div><div class="stat"><span>סה״כ כניסות</span><strong>${state.totalVisits}</strong></div><div class="stat"><span>Firebase</span><strong>${firebaseReady?"מחובר":"לא"}</strong></div></div><div class="adminPanel" style="margin-top:12px"><div class="card"><h3>עריכת פרופיל</h3><div class="formGrid"><input class="input" id="profileName" placeholder="שם מלא" value="${esc(currentUser?.name||"")}"><input class="input" id="profileUsername" placeholder="שם משתמש" value="${esc(currentUser?.username||"")}"></div><button class="btn" onclick="Narwal.updateProfile()">שמור פרופיל</button></div><div class="card"><h3>שינוי סיסמה</h3><div class="formGrid"><input class="input" id="oldPass" type="password" placeholder="סיסמה ישנה"><input class="input" id="newPass" type="password" placeholder="סיסמה חדשה"></div><button class="btn" onclick="Narwal.changePassword()">שנה סיסמה</button></div><div class="grid"><div class="card"><h3>FAQ</h3><p class="muted">${state.data.faq.length} שאלות</p><button class="btn" data-route="faq">ניהול FAQ</button></div><div class="card"><h3>תקלות</h3><p class="muted">${state.data.errors.length} תקלות</p><button class="btn" data-route="errors">ניהול תקלות</button></div><div class="card"><h3>סרטונים</h3><p class="muted">${state.data.videos.length} סרטונים</p><button class="btn" data-route="videos">ניהול סרטונים</button></div><div class="card"><h3>דגמים</h3><p class="muted">${state.data.models.length} דגמים</p><button class="btn" data-route="models">ניהול דגמים</button></div></div>${currentUser?.role==="main"?adminUsersBlock():"<div class='card'><h3>מנהלים</h3><p class='muted'>רק מנהל ראשי יכול לנהל משתמשים והרשאות.</p></div>"}<div class="card"><h3>פעולות</h3><button class="btn alt" onclick="Narwal.exportData()">ייצוא JSON</button> <button class="btn red" onclick="Narwal.logout()">יציאה</button></div></div></section>`}
function render(){navList.innerHTML=navHtml();bottomNav.innerHTML=bottomHtml();app.innerHTML=({home,models,compare,errors,faq,videos,official,downloads,device,admin}[state.page]||home)();if(state.page==="compare")setTimeout(runCompare,50);bindRoutes()}
function bindRoutes(){document.querySelectorAll("[data-route]").forEach(el=>{el.onclick=e=>{e.preventDefault();e.stopPropagation();go(el.dataset.route)}})}
function login(){const username=(document.getElementById("adminUser")?.value||"").trim();const password=(document.getElementById("adminPass")?.value||"").trim();const user=users.find(u=>u.username===username&&u.password===password);if(user){currentUser=user;state.isAdmin=true;if(document.getElementById("rememberMe")?.checked!==false)localStorage.setItem("nh4_current_user",JSON.stringify(user));go("admin")}else alert("שם משתמש או סיסמה לא נכונים")}
function logout(){currentUser=null;state.isAdmin=false;localStorage.removeItem("nh4_current_user");state.page="admin";render();scrollTo(0,0)}
function add(type){const need={faq:"faq",error:"errors",video:"videos",model:"models"}[type]||"settings";if(!requirePerm(need))return;if(type==="faq"){const cat=prompt("קטגוריה:","כללי");if(!cat)return;const q=prompt("שאלה:");if(!q)return;const a=prompt("תשובה:");if(!a)return;state.data.faq.unshift({cat,q,a});addAutoNews("faq","נוסף FAQ חדש: "+q,"faq");saveCloud();go("faq")}if(type==="error"){const code=prompt("קוד תקלה:");if(!code)return;const title=prompt("כותרת:");if(!title)return;const fix=prompt("פתרון:");if(!fix)return;state.data.errors.unshift({code,title,fix});addAutoNews("error","נוספה תקלה חדשה: "+code+" · "+title,"errors");saveCloud();go("errors")}if(type==="video"){const title=prompt("שם הסרטון:");if(!title)return;const url=prompt("קישור YouTube:");if(!url)return;state.data.videos.unshift({title,url});addAutoNews("video","נוסף סרטון חדש: "+title,"videos");saveCloud();go("videos")}if(type==="model"){const name=prompt("שם דגם:");if(!name)return;const suction=prompt("שאיבה:","");const wash=prompt("שטיפה:","");const ai=prompt("AI:","");const note=prompt("הערה:","");const image=prompt("תמונה: flow2 / flow / xUltra / zUltra או URL","flow2");state.data.models.unshift({name,suction,wash,ai,note,image});addAutoNews("model","נוסף דגם חדש: "+name,"models");saveCloud();go("models")}}
function edit(type,i){const need={faq:"faq",error:"errors",video:"videos",model:"models"}[type]||"settings";if(!requirePerm(need))return;const map={faq:"faq",error:"errors",video:"videos",model:"models"};if(type==="faq"){const item=state.data.faq[i];if(!item)return;const cat=prompt("קטגוריה:",item.cat);if(!cat)return;const q=prompt("שאלה:",item.q);if(!q)return;const a=prompt("תשובה:",item.a);if(!a)return;state.data.faq[i]={cat,q,a}}if(type==="error"){const item=state.data.errors[i];if(!item)return;const code=prompt("קוד תקלה:",item.code);if(!code)return;const title=prompt("כותרת:",item.title);if(!title)return;const fix=prompt("פתרון:",item.fix);if(!fix)return;state.data.errors[i]={code,title,fix}}if(type==="video"){const item=state.data.videos[i];if(!item)return;const title=prompt("שם הסרטון:",item.title);if(!title)return;const url=prompt("קישור:",item.url);if(!url)return;state.data.videos[i]={title,url}}if(type==="model"){const item=state.data.models[i];if(!item)return;const name=prompt("שם דגם:",item.name);if(!name)return;const suction=prompt("שאיבה:",item.suction);const wash=prompt("שטיפה:",item.wash);const ai=prompt("AI:",item.ai);const note=prompt("הערה:",item.note);const image=prompt("תמונה:",item.image||"flow2");state.data.models[i]={name,suction,wash,ai,note,image}}saveCloud();go(map[type])}
function del(type,i){const need={faq:"faq",error:"errors",video:"videos",model:"models"}[type]||"settings";if(!requirePerm(need))return;if(!confirm("למחוק?"))return;const map={faq:["faq","faq"],error:["errors","errors"],video:["videos","videos"],model:["models","models"]};const [arr,page]=map[type];state.data[arr].splice(i,1);cleanupNews();saveCloud();go(page)}
function runCompare(){const a=+document.getElementById("cmpA")?.value||0,b=+document.getElementById("cmpB")?.value||1,A=state.data.models[a],B=state.data.models[b],out=document.getElementById("compareOut");if(!out||!A||!B)return;out.innerHTML=`<table><tr><th>דגם</th><td><div class="modelMini"><div class="compareImg" style="background-image:url('${modelImageSrc(A)}')"></div><b>${esc(A.name)}</b></div></td><td><div class="modelMini"><div class="compareImg" style="background-image:url('${modelImageSrc(B)}')"></div><b>${esc(B.name)}</b></div></td></tr><tr><th>שאיבה</th><td>${esc(A.suction)}</td><td>${esc(B.suction)}</td></tr><tr><th>שטיפה</th><td>${esc(A.wash)}</td><td>${esc(B.wash)}</td></tr><tr><th>AI</th><td>${esc(A.ai)}</td><td>${esc(B.ai)}</td></tr><tr><th>הערה</th><td>${esc(A.note)}</td><td>${esc(B.note)}</td></tr></table>`}
function searchFAQ(q){q=(q||"").toLowerCase().trim();const box=document.getElementById("faqResults");if(!box)return;if(!q){box.innerHTML="";return}const res=state.data.faq.filter(f=>(f.cat+" "+f.q+" "+f.a).toLowerCase().includes(q));box.innerHTML=res.length?res.map(f=>`<div class="result"><b>${esc(f.q)}</b><br><span class="muted">${esc(f.a)}</span></div>`).join(""):`<div class="result">לא נמצאו תוצאות</div>`}
function search(q){q=(q||"").toLowerCase().trim();const box=document.getElementById("searchResults");if(!box)return;if(!q){box.innerHTML="";return}const out=[];state.data.faq.forEach(f=>{if((f.cat+" "+f.q+" "+f.a).toLowerCase().includes(q))out.push(["FAQ",f.q,f.a,"faq"])});state.data.errors.forEach(e=>{if((e.code+" "+e.title+" "+e.fix).toLowerCase().includes(q))out.push(["תקלה",e.code+" · "+e.title,e.fix,"errors"])});state.data.models.forEach(m=>{if(JSON.stringify(m).toLowerCase().includes(q))out.push(["דגם",m.name,m.note,"models"])});state.data.videos.forEach(v=>{if(JSON.stringify(v).toLowerCase().includes(q))out.push(["סרטון",v.title,v.url,"videos"])});box.innerHTML=out.length?out.slice(0,10).map(r=>`<div class="result" data-route="${r[3]}"><b>${esc(r[0])} · ${esc(r[1])}</b><br><span class="muted">${esc(r[2])}</span></div>`).join(""):`<div class="result">לא נמצאו תוצאות</div>`;bindRoutes()}
function addManagerForm(){if(currentUser?.role!=="main")return alert("רק מנהל ראשי יכול להוסיף מנהלים");const username=(document.getElementById("newMgrUser")?.value||"").trim();if(!username)return alert("שם משתמש חסר");if(users.some(u=>u.username===username))return alert("שם משתמש כבר קיים");const name=(document.getElementById("newMgrName")?.value||username).trim();const password=(document.getElementById("newMgrPass")?.value||"1234").trim();const role=document.getElementById("newMgrRole")?.value||"manager";const perms=[...document.querySelectorAll(".newPerm:checked")].map(x=>x.value);users.push({username,password,name,role,perms});saveUsers();render()}
function editManager(i){if(currentUser?.role!=="main")return alert("רק מנהל ראשי");const u=users[i];if(!u)return;const perms=prompt("הרשאות מופרדות בפסיק: faq,errors,videos,models,compare,users,settings",(u.perms||[]).join(","));if(perms===null)return;u.perms=perms.split(",").map(x=>x.trim()).filter(Boolean);saveUsers();render()}
function removeManager(i){if(currentUser?.role!=="main")return alert("רק מנהל ראשי יכול למחוק מנהלים");const u=users[i];if(!u||u.username==="shoval")return alert("אי אפשר למחוק מנהל ראשי");if(!confirm("למחוק מנהל?"))return;users.splice(i,1);saveUsers();render()}
function updateProfile(){
  if(!currentUser)return;
  const oldUsername=currentUser.username;
  const name=(document.getElementById("profileName")?.value||"").trim();
  const username=(document.getElementById("profileUsername")?.value||oldUsername).trim();
  if(!name||!username)return alert("מלא שם ושם משתמש");
  if(username!==oldUsername && users.some(x=>x.username===username))return alert("שם משתמש כבר קיים");
  const u=users.find(x=>x.username===oldUsername);
  if(!u)return alert("לא נמצא משתמש");
  u.name=name; u.username=username;
  currentUser={...currentUser,name,username};
  localStorage.setItem("nh4_current_user",JSON.stringify(currentUser));
  saveUsers();
  alert("הפרופיל עודכן");
  render();
}
function changePassword(){if(!currentUser)return;const old=(document.getElementById("oldPass")?.value||"").trim();const nw=(document.getElementById("newPass")?.value||"").trim();if(!old||!nw)return alert("מלא סיסמה ישנה וחדשה");const u=users.find(x=>x.username===currentUser.username);if(!u||u.password!==old)return alert("סיסמה ישנה לא נכונה");u.password=nw;currentUser.password=nw;localStorage.setItem("nh4_current_user",JSON.stringify(currentUser));saveUsers();alert("הסיסמה עודכנה")}

function editManagerProfile(i){
  if(currentUser?.role!=="main")return alert("רק מנהל ראשי");
  const u=users[i]; if(!u)return;
  const oldUsername=u.username;
  const name=prompt("שם מלא:",u.name||u.username); if(!name)return;
  const username=prompt("שם משתמש:",u.username); if(!username)return;
  if(username!==oldUsername && users.some(x=>x.username===username))return alert("שם משתמש כבר קיים");
  u.name=name; u.username=username;
  if(currentUser?.username===oldUsername){
    currentUser={...currentUser,name,username};
    localStorage.setItem("nh4_current_user",JSON.stringify(currentUser));
  }
  saveUsers();
  render();
}
function resetManagerPassword(i){
  if(currentUser?.role!=="main")return alert("רק מנהל ראשי");
  const u=users[i]; if(!u)return;
  const pass=prompt("סיסמה חדשה עבור "+(u.name||u.username)+":","1234");
  if(!pass)return;
  u.password=pass;
  saveUsers();
  alert("הסיסמה עודכנה");
  render();
}
function toggleManagerRole(i){
  if(currentUser?.role!=="main")return alert("רק מנהל ראשי");
  const u=users[i]; if(!u || u.username==="shoval")return alert("אי אפשר לשנות את המנהל הראשי הקבוע");
  u.role = u.role==="main" ? "manager" : "main";
  if(u.role==="main")u.perms=[...PERMS];
  saveUsers();
  render();
}

function exportData(){const blob=new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="narwal-hub-data.json";a.click()}
window.Narwal={go,goBack,login,logout,add,edit,del,runCompare,searchFAQ,search,exportData,addManagerForm,editManager,removeManager,changePassword,updateProfile,editManagerProfile,resetManagerPassword,toggleManagerRole};
document.getElementById("menuBtn").onclick=openDrawer;document.getElementById("closeDrawerBtn").onclick=closeDrawer;document.getElementById("backdrop").onclick=closeDrawer;document.getElementById("backBtn").onclick=goBack;
let sx=0,sy=0,sw=window.innerWidth;document.addEventListener("touchstart",e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;sw=window.innerWidth},{passive:true});document.addEventListener("touchend",e=>{if(drawer.classList.contains("open"))return;const t=e.changedTouches[0],dx=t.clientX-sx,dy=Math.abs(t.clientY-sy);if((sx<30&&dx>85&&dy<70)||(sx>sw-30&&dx<-85&&dy<70))goBack()},{passive:true});
ensureNewsData();initFirebase();render();
})();
